name: Update Market Screener Data

on:
  schedule:
    # Run daily at 10 PM ET (3 AM UTC next day) — after market close
    - cron: '0 3 * * 1-5'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance numpy pandas requests

      - name: Run batch script
        run: python fetch_all_tickers.py

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet data/market_screener.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market_screener.json
          git commit -m "Auto-update market screener data $(date +%Y-%m-%d)"
          git push
