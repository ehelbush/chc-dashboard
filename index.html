// ── CHC Trading Model (JavaScript port) ─────────────────────────────────────

function computeCHCModel(dates, closes, volumes, opts) {
  const {
    volFlag = 2, priceFlag = 1, volPriceMix = 0.72,
    buyThreshold = 0.0012, sellThreshold = -0.0012, evalYears = 5,
  } = opts || {};

  const n = closes.length;
  if (n < 130) return { error: "Not enough data (need 130+ days)" };

  // Trim to eval period
  const evalDays = evalYears * 252;
  let startTrim = 0;
  if (n > evalDays) startTrim = n - evalDays;
  const cl = closes.slice(startTrim);
  const vo = volumes.slice(startTrim);
  const dt = dates.slice(startTrim);
  const N = cl.length;

  const maWindows = { 0:1, 1:50, 2:100, 3:120 };
  const volWindow = maWindows[volFlag] || 100;
  const priceWindow = maWindows[priceFlag] || 50;
  const lookback = Math.max(volWindow, priceWindow, 5);

  // Volume up/down
  const vud = new Float64Array(N);
  vud[0] = vo[0];
  for (let i = 1; i < N; i++) {
    vud[i] = cl[i] >= cl[i-1] ? vo[i] : -vo[i];
  }

  // Volume ratio
  const vr = new Float64Array(N).fill(1);
  for (let i = volWindow; i < N; i++) {
    let ss = 0, as = 0;
    for (let j = i - volWindow + 1; j <= i; j++) { ss += vud[j]; as += vo[j]; }
    if (as > 0) vr[i] = ss / as;
  }

  // Price MA
  const pma = new Float64Array(N);
  for (let i = 0; i < N; i++) pma[i] = cl[i];
  for (let i = priceWindow; i < N; i++) {
    let s = 0;
    for (let j = i - priceWindow + 1; j <= i; j++) s += cl[j];
    pma[i] = s / priceWindow;
  }

  // Price slope
  const ps = new Float64Array(N);
  for (let i = 4; i < N; i++) {
    const mid = pma[i-2] || 1;
    ps[i] = (pma[i] - pma[i-4]) / mid;
  }

  // Combined signal
  const comb = new Float64Array(N);
  for (let i = 0; i < N; i++) comb[i] = volPriceMix * vr[i] + (1 - volPriceMix) * ps[i];

  // Generate signals & track balances
  const signals = new Array(N).fill("Hold");
  const bal = new Float64Array(N);
  const shares = new Float64Array(N);
  const bhBal = new Float64Array(N);
  const initBal = 100000;
  const si = lookback;

  bal[si] = initBal;
  shares[si] = initBal / cl[si];
  signals[si] = "Buy";
  const bhShares = cl[si] > 0 ? initBal / cl[si] : 0;

  for (let i = si; i < N; i++) bhBal[i] = bhShares * cl[i];

  for (let i = si + 1; i < N; i++) {
    if (comb[i] >= buyThreshold) signals[i] = "Buy";
    else if (comb[i] <= sellThreshold) signals[i] = "Sell";
    else signals[i] = signals[i-1];

    const traded = signals[i] !== signals[i-1];

    if (signals[i] === "Buy") {
      if (traded) {
        shares[i] = cl[i] > 0 ? bal[i-1] / cl[i] : 0;
        bal[i] = shares[i] * cl[i];
      } else {
        shares[i] = shares[i-1];
        bal[i] = shares[i] * cl[i];
      }
    } else if (signals[i] === "Sell") {
      if (traded) {
        bal[i] = shares[i-1] * cl[i];
        shares[i] = 0;
      } else {
        shares[i] = 0;
        bal[i] = bal[i-1];
      }
    } else {
      shares[i] = shares[i-1];
      bal[i] = shares[i] > 0 ? shares[i] * cl[i] : bal[i-1];
    }
  }

  // Metrics helper
  function calcMetrics(b, start) {
    const vals = [];
    for (let i = start; i < b.length; i++) if (b[i] > 0) vals.push(b[i]);
    if (vals.length < 2) return {};
    let maxB = vals[0];
    const dd = vals.map(v => { maxB = Math.max(maxB, v); return v / maxB - 1; });
    const lastYrDays = Math.min(252, vals.length - 1);
    const lastYrRet = vals[vals.length-1] / vals[vals.length - 1 - lastYrDays] - 1;
    const yrsElapsed = vals.length / 252;
    const avgYrRet = yrsElapsed > 0 && vals[0] > 0 ? Math.pow(vals[vals.length-1] / vals[0], 1/yrsElapsed) - 1 : 0;
    const currentLoss = dd[dd.length-1];
    const maxLoss = Math.min(...dd);
    const avgLoss = dd.reduce((a,b)=>a+b,0) / dd.length;
    const variance = dd.reduce((a,v)=>a+(v-avgLoss)**2,0) / dd.length;
    const stdLoss = Math.sqrt(variance);
    const stat3Loss = avgLoss - 3 * stdLoss;
    let recovery = 0;
    if (maxLoss < 0 && avgYrRet > 0) recovery = -2 * Math.log(1 + maxLoss) / Math.log(1 + avgYrRet);
    return {
      last_yr_return: +lastYrRet.toFixed(6), avg_yr_return: +avgYrRet.toFixed(6),
      current_loss: +currentLoss.toFixed(6), max_loss: +maxLoss.toFixed(6),
      avg_loss: +avgLoss.toFixed(6), stat3_loss: +stat3Loss.toFixed(6),
      recovery_period: +recovery.toFixed(2),
    };
  }

  const trading = calcMetrics(bal, si);
  const buyHold = calcMetrics(bhBal, si);
  const callStrength = comb[N-1] || 0;
  const buySignal = signals[N-1] || "Hold";
  const estNextYr = trading.last_yr_return != null ? (trading.last_yr_return + trading.avg_yr_return) / 2 : 0;

  // Downsample chart
  const step = Math.max(1, Math.floor((N - si) / 500));
  const chartDates = [], chartTrading = [], chartBH = [];
  for (let i = si; i < N; i += step) {
    chartDates.push(dt[i]);
    chartTrading.push(Math.round(bal[i]));
    chartBH.push(Math.round(bhBal[i]));
  }

  return {
    buy_sell_call: buySignal, call_strength: +callStrength.toFixed(6),
    est_next_yr_return: +estNextYr.toFixed(6),
    eval_period_start: dt[si] || "", eval_period_end: dt[N-1] || "",
    eval_years: evalYears, trading, buy_hold: buyHold,
    params: { vol_price_mix: volPriceMix, buy_threshold: buyThreshold, sell_threshold: sellThreshold },
    chart: { dates: chartDates, trading_balance: chartTrading, bh_balance: chartBH },
  };
}

// ── Yahoo Finance fetch via CORS proxies ────────────────────────────────────

function parseYahooChart(json, symbol) {
  const result = json.chart.result[0];
  const ts = result.timestamp;
  const q = result.indicators.quote[0];
  const adj = result.indicators.adjclose ? result.indicators.adjclose[0].adjclose : q.close;
  const dates = [], closes = [], volumes = [];
  for (let i = 0; i < ts.length; i++) {
    const c = adj ? (adj[i] || q.close[i]) : q.close[i];
    const v = q.volume[i];
    if (c != null && v != null) {
      dates.push(new Date(ts[i] * 1000).toISOString().slice(0,10));
      closes.push(c);
      volumes.push(v);
    }
  }
  return { dates, closes, volumes, name: result.meta.shortName || result.meta.symbol || symbol };
}

async function fetchYahooData(symbol, years) {
  // Try Vercel serverless API first (works when deployed to Vercel)
  try {
    const apiUrl = `/api/yahoo?symbol=${encodeURIComponent(symbol)}&years=${years + 1}`;
    const res = await fetch(apiUrl, { signal: AbortSignal.timeout(15000) });
    if (res.ok) {
      const data = await res.json();
      if (data.dates && data.dates.length > 0) {
        return { dates: data.dates, closes: data.closes, volumes: data.volumes, name: data.name || symbol };
      }
      if (data.error) return { error: data.error };
    }
  } catch (e) { /* Fall through to CORS proxies */ }

  // Fallback: CORS proxies (for GitHub Pages or local dev)
  const end = Math.floor(Date.now() / 1000);
  const start = end - years * 365 * 86400 - 30 * 86400;
  const yfUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?period1=${start}&period2=${end}&interval=1d`;

  const proxies = [
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    url => url,
  ];

  for (const makeProxy of proxies) {
    try {
      const fetchUrl = makeProxy(yfUrl);
      const res = await fetch(fetchUrl, { signal: AbortSignal.timeout(10000) });
      if (!res.ok) continue;
      const json = await res.json();
      if (json.chart && json.chart.result && json.chart.result[0]) {
        return parseYahooChart(json, symbol);
      }
    } catch (e) { continue; }
  }

  return { error: `Could not fetch live data for ${symbol}. Screener summary data may be available.` };
}


// ── Helpers ──────────────────────────────────────────────────────────────────
const pct = (v, dec=1) => v == null || isNaN(v) ? "\u2014" : (v*100).toFixed(dec)+"%";
const pc = v => v >= 0 ? "pos" : "neg";
const rc = v => v <= 2 ? "rl" : v <= 4 ? "rm" : v <= 6 ? "rh" : "rc";
const dlr = v => v == null ? "\u2014" : "$"+v.toLocaleString("en-US",{maximumFractionDigits:0});


// ── SVG Chart ───────────────────────────────────────────────────────────────
function Chart({ data, width, height, lines, xKey }) {
  const [tip, setTip] = useState(null);
  const ref = useRef(null);
  const p = {t:20,r:20,b:40,l:70};
  const w = width-p.l-p.r, h2 = height-p.t-p.b;
  if (!data || !data.length) return null;

  let allV = [];
  lines.forEach(l => data.forEach(d => { if(d[l.key]!=null) allV.push(d[l.key]); }));
  const mn = Math.min(...allV), mx = Math.max(...allV), rng = mx-mn||1;
  const xS = i => p.l+(i/(data.length-1))*w;
  const yS = v => p.t+h2-((v-mn)/rng)*h2;

  const paths = lines.map(l => {
    let d="";
    data.forEach((pt,i) => { const v=pt[l.key]; if(v!=null){const x=xS(i),y=yS(v); d+=(d===""?`M${x},${y}`:` L${x},${y}`);} });
    return {...l,d};
  });

  const yT = []; for(let i=0;i<=5;i++){const v=mn+(rng/5)*i; yT.push({v,y:yS(v)});}
  const xT = []; const xs=Math.max(1,Math.floor(data.length/6));
  for(let i=0;i<data.length;i+=xs) xT.push({i,x:xS(i),label:data[i][xKey]?data[i][xKey].substring(0,7):""});

  const onMM = e => {
    const r2=ref.current.getBoundingClientRect();
    const mx2=e.clientX-r2.left-p.l;
    const idx=Math.round((mx2/w)*(data.length-1));
    if(idx>=0&&idx<data.length) setTip({idx,x:e.clientX-r2.left,y:e.clientY-r2.top});
  };

  return (
    <div className="cc" style={{width}}>
      <svg ref={ref} width={width} height={height} onMouseMove={onMM} onMouseLeave={()=>setTip(null)}>
        {yT.map((t,i)=><line key={i} x1={p.l} y1={t.y} x2={width-p.r} y2={t.y} stroke="#2e3348" strokeWidth="1" strokeDasharray="4,4"/>)}
        {yT.map((t,i)=><text key={"yl"+i} x={p.l-8} y={t.y+4} textAnchor="end" fill="#9498a8" fontSize="11">{"$"+(t.v/1000).toFixed(0)+"k"}</text>)}
        {xT.map((t,i)=><text key={"xl"+i} x={t.x} y={height-8} textAnchor="middle" fill="#9498a8" fontSize="10">{t.label}</text>)}
        {paths.map((q,i)=><path key={i} d={q.d} fill="none" stroke={q.color} strokeWidth={q.width||2} opacity={q.opacity||1}/>)}
        {tip&&<line x1={xS(tip.idx)} y1={p.t} x2={xS(tip.idx)} y2={p.t+h2} stroke="#9498a8" strokeWidth="1" strokeDasharray="3,3"/>}
      </svg>
      {tip&&tip.idx<data.length&&(
        <div className="ctt" style={{left:Math.min(tip.x+12,width-160),top:20}}>
          <div style={{color:"#9498a8",marginBottom:4}}>{data[tip.idx][xKey]}</div>
          {lines.map((l,i)=><div key={i} style={{color:l.color}}>{l.label}: {dlr(data[tip.idx][l.key])}</div>)}
        </div>
      )}
      <div className="cl">{lines.map((l,i)=><div key={i} className="cli"><div className="cld" style={{background:l.color}}/>{l.label}</div>)}</div>
    </div>
  );
}

function MarketScreener({onSelect}) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState("");
  const [filter, setFilter] = useState("all");
  const [sortCfg, setSortCfg] = useState({key:"recovery_period",dir:1});
  const [page, setPage] = useState(0);
  const perPage = 50;

  useEffect(() => {
    fetch("data/market_screener.json")
      .then(r => r.json())
      .then(d => { setData(d); setLoading(false); })
      .catch(() => setLoading(false));
  }, []);

  const handleSort = key => { setSortCfg(prev => ({key, dir: prev.key===key ? -prev.dir : 1})); setPage(0); };

  const filtered = useMemo(() => {
    if (!data || !data.results) return [];
    let items = data.results;
    if (search) {
      const q = search.toUpperCase();
      items = items.filter(t => t.ticker.includes(q));
    }
    if (filter === "buy") items = items.filter(t => t.buy_sell_call === "Buy");
    if (filter === "sell") items = items.filter(t => t.buy_sell_call === "Sell");
    const {key, dir} = sortCfg;
    return [...items].sort((a, b) => {
      const av = a[key] != null ? a[key] : 0, bv = b[key] != null ? b[key] : 0;
      if (typeof av === "string") return dir * av.localeCompare(bv);
      return dir * (av - bv);
    });
  }, [data, search, filter, sortCfg]);

  const totalPages = Math.ceil(filtered.length / perPage);
  const pageItems = filtered.slice(page * perPage, (page + 1) * perPage);

  if (loading) return <div className="loading"><div className="spinner"></div> Loading market screener data...</div>;
  if (!data || !data.results || data.results.length === 0) {
    return (
      <div className="card" style={{textAlign:"center",padding:40}}>
        <div style={{fontSize:18,fontWeight:600,marginBottom:12}}>Market Screener Data Not Found</div>
        <div style={{color:"var(--text2)",maxWidth:500,margin:"0 auto",lineHeight:1.6}}>
          Run the batch script on your Mac to generate the data:<br/>
          <code style={{background:"var(--bg3)",padding:"2px 8px",borderRadius:4,fontSize:13}}>python3 fetch_all_tickers.py</code><br/><br/>
          Then push to GitHub:<br/>
          <code style={{background:"var(--bg3)",padding:"2px 8px",borderRadius:4,fontSize:13}}>git add . && git commit -m "Add screener data" && git push</code>
        </div>
      </div>
    );
  }

  const buyCount = data.results.filter(t => t.buy_sell_call === "Buy").length;
  const sellCount = data.results.length - buyCount;

  return (
    <div>
      <div className="metrics-grid">
        <div className="metric-card"><div className="metric-label">Total Tickers</div><div className="metric-value" style={{color:"var(--blue)"}}>{data.total_tickers.toLocaleString()}</div><div className="metric-sub">NYSE + NASDAQ</div></div>
        <div className="metric-card"><div className="metric-label">Buy Signals</div><div className="metric-value pos">{buyCount.toLocaleString()}</div><div className="metric-sub">{(buyCount/data.total_tickers*100).toFixed(0)}% of market</div></div>
        <div className="metric-card"><div className="metric-label">Sell Signals</div><div className="metric-value neg">{sellCount.toLocaleString()}</div><div className="metric-sub">{(sellCount/data.total_tickers*100).toFixed(0)}% of market</div></div>
        <div className="metric-card"><div className="metric-label">Data Date</div><div className="metric-value" style={{fontSize:18}}>{data.date}</div><div className="metric-sub">Last batch run</div></div>
      </div>

      <div className="card">
        <div className="screener-controls">
          <input className="search-input" type="text" placeholder="Search ticker..." value={search} onChange={e=>{setSearch(e.target.value.toUpperCase());setPage(0);}}/>
          <button className={"filter-btn"+(filter==="all"?" active":"")} onClick={()=>{setFilter("all");setPage(0);}}>All</button>
          <button className={"filter-btn"+(filter==="buy"?" active":"")} onClick={()=>{setFilter("buy");setPage(0);}}>Buy Only</button>
          <button className={"filter-btn"+(filter==="sell"?" active":"")} onClick={()=>{setFilter("sell");setPage(0);}}>Sell Only</button>
          <span className="screener-stats">Showing {filtered.length.toLocaleString()} tickers</span>
        </div>

        <SummaryTable tickers={pageItems} onSelect={onSelect} sortCfg={sortCfg} onSort={handleSort}/>

        {totalPages>1&&(
          <div className="pagination">
            <button className="page-btn" disabled={page===0} onClick={()=>setPage(0)}>{"\u00AB"}</button>
            <button className="page-btn" disabled={page===0} onClick={()=>setPage(p=>p-1)}>{"\u2039"} Prev</button>
            <span style={{fontSize:13,color:"var(--text2)",padding:"0 8px"}}>Page {page+1} of {totalPages}</span>
            <button className="page-btn" disabled={page>=totalPages-1} onClick={()=>setPage(p=>p+1)}>Next {"\u203A"}</button>
            <button className="page-btn" disabled={page>=totalPages-1} onClick={()=>setPage(totalPages-1)}>{"\u00BB"}</button>
          </div>
        )}
      </div>
    </div>
  );
}

              {isStale && " \u2014 Run schwab_auth.py to reconnect"}
            </span>
          </div>
        </div>
      )}

      {!isStale && !auth.needs_reauth && (
        <div style={{background:"rgba(34,197,94,0.08)", border:"1px solid rgba(34,197,94,0.3)", borderRadius:10, padding:"10px 20px", marginBottom:20, display:"flex", alignItems:"center", gap:12, fontSize:13}}>
          <span style={{color:"var(--green)",fontSize:10}}>{"\u25CF"}</span>
          <span style={{color:"var(--green)",fontWeight:600}}>Live</span>
          <span style={{color:"var(--text2)"}}>Synced {syncedAt} {"\u2014"} Token valid for {auth.refresh_days_remaining} days</span>
        </div>
      )}

      {/* Portfolio summary metrics */}
      <div className="metrics-grid">
        <div className="metric-card">
          <div className="metric-label">Total Portfolio Value</div>
          <div className="metric-value" style={{color:"var(--blue)"}}>${(summary.total_value||0).toLocaleString("en-US",{maximumFractionDigits:0})}</div>
          <div className="metric-sub">{summary.positions_count||0} positions across {summary.accounts_count||0} account(s)</div>
        </div>
        <div className="metric-card">
          <div className="metric-label">Cash Balance</div>
          <div className="metric-value">${(summary.total_cash||0).toLocaleString("en-US",{maximumFractionDigits:0})}</div>
          <div className="metric-sub">{summary.total_equity ? ((summary.total_cash / summary.total_equity * 100).toFixed(1) + "% of equity") : ""}</div>
        </div>
        <div className="metric-card">
          <div className="metric-label">Total Equity</div>
          <div className="metric-value">${(summary.total_equity||0).toLocaleString("en-US",{maximumFractionDigits:0})}</div>
          <div className="metric-sub">Liquidation value</div>
        </div>
        <div className="metric-card">
          <div className="metric-label">Accounts</div>
          <div className="metric-value" style={{fontSize:20}}>{schwabData.accounts.map(a => a.account_id).join(", ")}</div>
          <div className="metric-sub">{schwabData.accounts.map(a => a.account_type).join(", ")}</div>
        </div>
      </div>

      {/* Benchmark comparison */}
      {Object.keys(benchmarks).length > 0 && (
        <div className="card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div className="card-title" style={{margin:0}}>Portfolio vs Benchmarks</div>
            <div style={{display:"flex",gap:4}}>
              <button className={"filter-btn"+(benchView==="returns"?" active":"")} onClick={()=>setBenchView("returns")} style={{padding:"4px 12px",fontSize:12}}>Returns</button>
              <button className={"filter-btn"+(benchView==="drawdown"?" active":"")} onClick={()=>setBenchView("drawdown")} style={{padding:"4px 12px",fontSize:12}}>Drawdown</button>
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:16}}>
            {Object.entries(benchmarks).map(([sym, bm]) => {
              const color = bColors[sym] || "#9498a8";
              const name = bNames[sym] || sym;
              const val = benchView === "returns" ? bm.one_yr_return : bm.max_drawdown;
              const annVal = bm.annualized_return;
              const ytdVal = bm.ytd_return;

              return (
                <div key={sym} style={{background:"var(--bg3)",borderRadius:8,padding:16}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                    <div>
                      <span style={{fontWeight:700,color,fontSize:16}}>{sym}</span>
                      <span style={{color:"var(--text2)",fontSize:12,marginLeft:8}}>{name}</span>
                    </div>
                    <span style={{fontSize:12,color:"var(--text2)"}}>${bm.current_price.toLocaleString()}</span>
                  </div>

                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                    <div>
                      <div style={{fontSize:11,color:"var(--text2)"}}>1Y Return</div>
                      <div style={{fontSize:15,fontWeight:700}} className={pc(bm.one_yr_return)}>{pct(bm.one_yr_return)}</div>
                    </div>
                    <div>
                      <div style={{fontSize:11,color:"var(--text2)"}}>YTD</div>
                      <div style={{fontSize:15,fontWeight:700}} className={pc(bm.ytd_return)}>{pct(bm.ytd_return)}</div>
                    </div>
                    <div>
                      <div style={{fontSize:11,color:"var(--text2)"}}>Annualized</div>
                      <div style={{fontSize:15,fontWeight:700}} className={pc(bm.annualized_return)}>{pct(bm.annualized_return)}</div>
                    </div>
                  </div>

                  {benchView === "drawdown" && (
                    <div style={{marginTop:8}}>
                      <div style={{fontSize:11,color:"var(--text2)"}}>Max Drawdown</div>
                      <div style={{background:"var(--bg)",borderRadius:4,height:8,marginTop:4,position:"relative",overflow:"hidden"}}>
                        <div style={{position:"absolute",right:0,top:0,height:"100%",width:Math.abs(bm.max_drawdown*100)+"%",background:"var(--red)",borderRadius:4,opacity:0.7}}/>
                      </div>
                      <div style={{fontSize:12,color:"var(--red)",fontWeight:600,marginTop:4}}>{pct(bm.max_drawdown)}</div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Sector allocation */}
      {sectors.length > 0 && (
        <div className="card">
          <div className="card-title">Sector Allocation</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {sectors.map((s, i) => (
              <div key={s.name} style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:140,fontSize:12,color:"var(--text2)",flexShrink:0,textOverflow:"ellipsis",overflow:"hidden",whiteSpace:"nowrap"}}>{s.name}</div>
                <div style={{flex:1,background:"var(--bg3)",borderRadius:4,height:20,position:"relative",overflow:"hidden"}}>
                  <div style={{position:"absolute",left:0,top:0,height:"100%",width:(s.weight*100)+"%",background:sColors[i%sColors.length],borderRadius:4,opacity:0.8,transition:"width 0.3s"}}/>
                </div>
                <div style={{width:50,textAlign:"right",fontSize:12,fontWeight:600,color:sColors[i%sColors.length]}}>{(s.weight*100).toFixed(1)}%</div>
                <div style={{width:80,textAlign:"right",fontSize:12,color:"var(--text2)"}}>${(s.value/1000).toFixed(1)}k</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Holdings table */}
      <div className="card">
        <div className="card-title">Holdings<span style={{color:"var(--text2)",fontWeight:400,marginLeft:8,fontSize:12}}>(click to run CHC model)</span></div>
        <div className="table-wrap">
          <table>
            <thead><tr>
              {[
                {label:"Symbol",field:"symbol"},{label:"Name",field:"name"},{label:"Qty",field:"quantity"},
                {label:"Avg Cost",field:"avg_cost"},{label:"Price",field:"current_price"},
                {label:"Mkt Value",field:"market_value"},{label:"Total Gain",field:"total_gain"},
                {label:"Gain %",field:"total_gain_pct"},{label:"Day %",field:"day_gain_pct"}
              ].map(col => (
                <th key={col.field} onClick={()=>handleHoldSort(col.field)}>
                  {col.label}<span className="sa">{holdSort.key===col.field?(holdSort.dir===1?"\u25B2":"\u25BC"):"\u21C5"}</span>
                </th>
              ))}
            </tr></thead>
            <tbody>
              {sortedHoldings.map(h => (
                <tr key={h.symbol} onClick={()=>onAnalyzeTicker && onAnalyzeTicker(h.symbol)} style={{cursor:"pointer"}}>
                  <td className="tc">{h.symbol}</td>
                  <td style={{maxWidth:200,overflow:"hidden",textOverflow:"ellipsis"}}>{h.name}</td>
                  <td>{h.quantity.toLocaleString("en-US",{maximumFractionDigits:2})}</td>
                  <td>${h.avg_cost.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
                  <td>${h.current_price.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
                  <td style={{fontWeight:600}}>${h.market_value.toLocaleString("en-US",{maximumFractionDigits:0})}</td>
                  <td className={h.total_gain>=0?"pos":"neg"}>${h.total_gain.toLocaleString("en-US",{maximumFractionDigits:0})}</td>
                  <td className={pc(h.total_gain_pct)}>{pct(h.total_gain_pct)}</td>
                  <td className={pc(h.day_gain_pct)}>{pct(h.day_gain_pct)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* Top Holdings Donut (text-based) */}
      {summary.top_holdings && summary.top_holdings.length > 0 && (
        <div className="card">
          <div className="card-title">Top 10 Holdings by Weight</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {summary.top_holdings.map((h, i) => (
              <div key={h.symbol} style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:60,fontSize:13,fontWeight:700,color:"var(--blue)"}}>{h.symbol}</div>
                <div style={{flex:1,background:"var(--bg3)",borderRadius:4,height:24,position:"relative",overflow:"hidden"}}>
                  <div style={{position:"absolute",left:0,top:0,height:"100%",width:(h.weight*100)+"%",background:sColors[i%sColors.length],borderRadius:4,opacity:0.6}}/>
                  <span style={{position:"absolute",left:8,top:3,fontSize:11,fontWeight:600,color:"var(--text)"}}>{(h.weight*100).toFixed(1)}%</span>
                </div>
                <div style={{width:80,textAlign:"right",fontSize:12,color:"var(--text2)"}}>${(h.value/1000).toFixed(1)}k</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Recent trades */}
      {schwabData.accounts.some(a => a.recent_trades && a.recent_trades.length > 0) && (
        <div className="card">
          <div className="card-title">Recent Trades (90 days)</div>
          <div className="table-wrap">
            <table>
              <thead><tr>
                <th>Date</th><th>Symbol</th><th>Type</th><th>Qty</th><th>Amount</th>
              </tr></thead>
              <tbody>
                {schwabData.accounts.flatMap(a => a.recent_trades || []).slice(0, 20).map((t, i) => (
                  <tr key={i}>
                    <td>{t.date ? t.date.substring(0,10) : "\u2014"}</td>
                    <td className="tc">{t.symbol || "\u2014"}</td>
                    <td>{t.type}</td>
                    <td>{t.quantity ? t.quantity.toLocaleString() : "\u2014"}</td>
                    <td className={t.amount>=0?"pos":"neg"}>${Math.abs(t.amount).toLocaleString("en-US",{maximumFractionDigits:2})}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}


// ── Main App ────────────────────────────────────────────────────────────────

function App() {
  const [page, setPage] = useState("portfolio");
  const [view, setView] = useState("dashboard");
  const [localData, setLocalData] = useState(null);
  const [screenerData, setScreenerData] = useState(null);
  const [tickerDetail, setTickerDetail] = useState(null);
  const [loading, setLoading] = useState(true);
  const [analyzing, setAnalyzing] = useState(false);
  const [error, setError] = useState(null);
  const [symbol, setSymbol] = useState("");
  const [years, setYears] = useState(5);
  const [mix, setMix] = useState(0.72);
  const [sortCfg, setSortCfg] = useState({key:"recovery_period",dir:1});

  // Load local ticker data + screener data
  useEffect(() => {
    Promise.all([
      fetch("data/tickers.json").then(r => r.json()).catch(() => null),
      fetch("data/market_screener.json").then(r => r.json()).catch(() => null),
    ]).then(([td, sd]) => {
      setLocalData(td);
      setScreenerData(sd);
      setLoading(false);
    });
  }, []);

  const handleSort = key => setSortCfg(prev => ({key, dir: prev.key===key ? -prev.dir : 1}));

  const analyzeTicker = useCallback(async (sym, y, m) => {
    const s = (sym || symbol).toUpperCase().trim();
    if (!s) return;
    setAnalyzing(true);
    setError(null);
    setView("detail");
    const yr = y != null ? y : years;
    const mx = m != null ? m : mix;

    try {
      let dates, closes, volumes, name = s;
      let hasFullData = false;

      // Try live Yahoo Finance data first (via Vercel API)
      const yfData = await fetchYahooData(s, yr + 1);
      if (!yfData.error) {
        dates = yfData.dates; closes = yfData.closes; volumes = yfData.volumes; name = yfData.name;
        hasFullData = true;
      } else if (localData && localData[s]) {
        // Fall back to pre-loaded local data
        const ld = localData[s];
        dates = ld.d; closes = ld.c; volumes = ld.v; name = ld.s || s;
        hasFullData = true;
      }

      if (hasFullData) {
        const result = computeCHCModel(dates, closes, volumes, {
          evalYears: yr, volPriceMix: mx,
        });
        if (result.error) { setError(result.error); setAnalyzing(false); return; }
        result.symbol = s;
        result.name = name;
        setTickerDetail(result);
      } else {
        // Fall back to screener summary data (no chart, but shows metrics)
        const sr = screenerData && screenerData.results
          ? screenerData.results.find(r => r.ticker === s) : null;
        if (sr) {
          setTickerDetail({
            symbol: s, name: s,
            buy_sell_call: sr.buy_sell_call,
            call_strength: sr.call_strength,
            est_next_yr_return: sr.est_next_yr_return,
            eval_period_start: "", eval_period_end: screenerData.date || "",
            trading: {
              last_yr_return: sr.last_yr_return,
              avg_yr_return: sr.av_yrly_return,
              current_loss: sr.current_loss,
              max_loss: null,
              stat3_loss: sr.stat3_loss,
              recovery_period: sr.recovery_period,
            },
            buy_hold: { last_yr_return: null, avg_yr_return: null, current_loss: null, max_loss: null, stat3_loss: null, recovery_period: null },
            chart: { dates: [], trading_balance: [], bh_balance: [] },
            params: { vol_price_mix: 0.72, buy_threshold: 0.0012, sell_threshold: -0.0012 },
            summaryOnly: true,
          });
        } else {
          setError(`No data found for ${s}. It may not be a valid ticker symbol.`);
        }
      }
    } catch (e) {
      setError(e.message);
    }
    setAnalyzing(false);
  }, [symbol, years, mix, localData, screenerData]);

  const handleSelect = ticker => { setSymbol(ticker); analyzeTicker(ticker, years, mix); };
  const handleKey = e => { if (e.key === "Enter") analyzeTicker(); };

  if (loading) return <div className="app"><div className="loading"><div className="spinner"></div> Loading dashboard...</div></div>;

  return (
    <div className="app">
      <div className="header">
        <h1><span>Cherry</span>Head Capital<span style={{color:"var(--text2)",fontSize:14,fontWeight:400,marginLeft:12}}>Trading Model Dashboard</span></h1>
        <div className="header-right"><span className="badge badge-green">Trading Active</span><span className="badge badge-blue">v4.2.5</span></div>
      </div>

      <div className="nav-tabs">
        <div className={"nav-tab"+(page==="portfolio"&&view!=="detail"?" active":"")} onClick={()=>{setPage("portfolio");setView("dashboard");}}>Portfolio</div>
        <div className={"nav-tab"+(page==="account"&&view!=="detail"?" active":"")} onClick={()=>{setPage("account");setView("dashboard");}}>Account</div>
        <div className={"nav-tab"+(page==="screener"&&view!=="detail"?" active":"")} onClick={()=>{setPage("screener");setView("dashboard");}}>Market Screener</div>
      </div>

      <div className="card">
        <div className="controls">
          <div className="cg"><label>Ticker Symbol</label><input type="text" value={symbol} onChange={e=>setSymbol(e.target.value.toUpperCase())} onKeyDown={handleKey} placeholder="e.g. MSFT" style={{width:120}}/></div>
          <div className="cg"><label>Evaluation Period</label>
            <select value={years} onChange={e=>setYears(Number(e.target.value))}>
              <option value={1}>1 Year</option><option value={2}>2 Years</option><option value={3}>3 Years</option>
              <option value={5}>5 Years</option><option value={7}>7 Years</option><option value={10}>10 Years</option>
            </select>
          </div>
          <div className="cg"><label>Vol/Price Mix</label><input type="number" value={mix} onChange={e=>setMix(Number(e.target.value))} step={0.05} min={0} max={1} style={{width:80}}/></div>
          <button onClick={()=>analyzeTicker()} disabled={analyzing||!symbol}>{analyzing?"Analyzing...":"Analyze"}</button>
          {view==="detail"&&<button className="btn-s" onClick={()=>setView("dashboard")}>{"\u2190"} Back</button>}
        </div>
        {error&&<div className="error-msg">{error}</div>}
      </div>

      {view==="dashboard"&&page==="portfolio"&&(
        <div>
          <PortfolioMetrics portfolio={PORTFOLIO}/>
          <div className="card">
            <div className="card-title">Portfolio Tickers {"\u2014"} Sorted by {sortCfg.key.replace(/_/g," ")}<span style={{color:"var(--text2)",fontWeight:400,marginLeft:8}}>(click a row to analyze)</span></div>
            <SummaryTable tickers={SEED_DATA} onSelect={handleSelect} sortCfg={sortCfg} onSort={handleSort}/>
          </div>
        </div>
      )}

      {view==="dashboard"&&page==="account"&&(
        <SchwabAccount onAnalyzeTicker={handleSelect}/>
      )}

      {view==="dashboard"&&page==="screener"&&(
        <MarketScreener onSelect={handleSelect}/>
      )}

      {view==="detail"&&(analyzing
        ? <div className="loading"><div className="spinner"></div> Fetching data and running model...</div>
        : <TickerDetail data={tickerDetail} onBack={()=>setView("dashboard")}/>
      )}

      <div className="footer">CherryHead Capital Trading Model Dashboard</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
