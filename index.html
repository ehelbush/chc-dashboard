<!DOCTYPE html>
<html lang="en">

  <title>CherryHead Capital — Trading Model Dashboard</title>

  <style>
    :root, [data-theme="dark"] {
      --bg: #0f1117; --bg2: #1a1d29; --bg3: #242836; --border: #2e3348;
      --text: #e4e6ed; --text2: #9498a8;
      --green: #22c55e; --green-bg: rgba(34,197,94,0.12);
      --red: #ef4444; --red-bg: rgba(239,68,68,0.12);
      --blue: #3b82f6; --blue-bg: rgba(59,130,246,0.12);
      --gold: #eab308;
    }
    [data-theme="light"] {
      --bg: #f5f6f8; --bg2: #ffffff; --bg3: #e8eaef; --border: #d0d3dc;
      --text: #1a1d29; --text2: #5a5e6e;
      --green: #16a34a; --green-bg: rgba(22,163,74,0.1);
      --red: #dc2626; --red-bg: rgba(220,38,38,0.1);
      --blue: #2563eb; --blue-bg: rgba(37,99,235,0.1);
      --gold: #ca8a04;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    .app { max-width:1400px; margin:0 auto; padding:20px; }
    .header { display:flex; align-items:center; justify-content:space-between; padding:16px 0; border-bottom:1px solid var(--border); margin-bottom:24px; flex-wrap:wrap; gap:8px; }
    .header h1 { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
    .header h1 span { color:var(--green); }
    .header-right { display:flex; gap:12px; align-items:center; }
    .badge { font-size:11px; padding:4px 10px; border-radius:20px; font-weight:600; }
    .badge-green { background:var(--green-bg); color:var(--green); }
    .badge-blue { background:var(--blue-bg); color:var(--blue); }
    .card { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:20px; }
    .card-title { font-size:14px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:16px; }
    .metrics-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:24px; }
    .metric-card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:16px; }
    .metric-label { font-size:12px; color:var(--text2); margin-bottom:6px; }
    .metric-value { font-size:24px; font-weight:700; }
    .metric-sub { font-size:11px; color:var(--text2); margin-top:4px; }
    .table-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th { text-align:left; padding:10px 12px; font-weight:600; color:var(--text2); border-bottom:2px solid var(--border); white-space:nowrap; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; cursor:pointer; user-select:none; }
    th:hover { color:var(--text); }
    th .sa { margin-left:4px; font-size:10px; }
    th { cursor:pointer; user-select:none; }
    th:hover { color:var(--blue); }
    td { padding:10px 12px; border-bottom:1px solid var(--border); white-space:nowrap; }
    tr:hover td { background:rgba(128,128,128,0.06); }
    .tc { font-weight:700; color:var(--blue); }
    .buy { color:var(--green); font-weight:600; }
    .sell { color:var(--red); font-weight:600; }
    .pos { color:var(--green); }
    .neg { color:var(--red); }
    .sb { display:flex; align-items:center; gap:8px; }
    .st { width:60px; height:6px; background:var(--bg3); border-radius:3px; position:relative; overflow:hidden; }
    .sf { position:absolute; top:0; height:100%; border-radius:3px; }
    .controls { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; }
    .cg { display:flex; flex-direction:column; gap:4px; }
    .cg label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
    input,select { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:8px; font-size:14px; outline:none; }
    input:focus,select:focus { border-color:var(--blue); }
    button { background:var(--blue); color:white; border:none; padding:9px 20px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; transition:opacity 0.2s; }
    button:hover { opacity:0.85; }
    button:disabled { opacity:0.4; cursor:not-allowed; }
    .btn-s { background:var(--bg3); border:1px solid var(--border); }
    .dg { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    @media(max-width:900px){ .dg{grid-template-columns:1fr;} }
    .ds { margin-bottom:16px; }
    .ds h4 { font-size:12px; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:10px; }
    .dr { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); font-size:13px; }
    .dr:last-child { border-bottom:none; }
    .loading { display:flex; align-items:center; justify-content:center; padding:60px; color:var(--text2); }
    .spinner { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin 0.8s linear infinite; margin-right:10px; display:inline-block; }
    @keyframes spin { to{transform:rotate(360deg);} }
    .rl { color:#22c55e; } .rm { color:#eab308; } .rh { color:#f97316; } .rc { color:#ef4444; }
    .error-msg { color:var(--red); padding:20px; text-align:center; }
    .cc { position:relative; }
    .cc svg { display:block; }
    .cl { display:flex; gap:20px; margin-top:12px; justify-content:center; }
    .cli { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text2); }
    .cld { width:10px; height:10px; border-radius:50%; }
    .ctt { position:absolute; pointer-events:none; background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:8px 12px; font-size:11px; white-space:nowrap; z-index:10; }
    .footer { text-align:center; padding:24px; color:var(--text2); font-size:12px; }
    .nav-tabs { display:flex; gap:4px; margin-bottom:24px; }
    .nav-tab { padding:10px 24px; border-radius:8px 8px 0 0; font-size:14px; font-weight:600; cursor:pointer; border:1px solid var(--border); border-bottom:none; background:var(--bg); color:var(--text2); transition:all 0.2s; }
    .nav-tab:hover { color:var(--text); }
    .nav-tab.active { background:var(--bg2); color:var(--text); border-color:var(--border); }
    .screener-controls { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:16px; }
    .search-input { width:240px; }
    .filter-btn { background:var(--bg3); border:1px solid var(--border); color:var(--text2); padding:7px 16px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; }
    .filter-btn:hover { color:var(--text); border-color:var(--text2); }
    .filter-btn.active { background:var(--blue-bg); color:var(--blue); border-color:var(--blue); }
    .screener-stats { font-size:12px; color:var(--text2); margin-left:auto; }
    .pagination { display:flex; gap:8px; align-items:center; justify-content:center; padding:16px 0; }
    .page-btn { background:var(--bg3); border:1px solid var(--border); color:var(--text2); padding:6px 14px; border-radius:6px; font-size:13px; cursor:pointer; }
    .page-btn:hover { color:var(--text); }
    .page-btn.active { background:var(--blue-bg); color:var(--blue); border-color:var(--blue); }
    .page-btn:disabled { opacity:0.3; cursor:not-allowed; }
    /* Mobile responsive */
    .nav-tabs { position:relative; }
    .hamburger { display:none; background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:8px 16px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
    @media(max-width:768px){
      .hamburger { display:flex; align-items:center; gap:8px; }
      .nav-tabs { flex-direction:column; }
      .nav-tabs .nav-tab { display:none; }
      .nav-tabs.open .nav-tab { display:block; width:100%; border-radius:8px; border:1px solid var(--border); margin-bottom:2px; }
      .app { padding:12px; }
      .header h1 { font-size:17px; }
      .header h1 span[style] { display:none; }
      .metrics-grid { grid-template-columns:1fr 1fr; gap:8px; }
      .metric-value { font-size:18px; }
      .controls { gap:8px; }
      .cg label { font-size:9px; }
      input,select { padding:6px 8px; font-size:13px; }
      .search-input { width:100%; }
      .screener-controls { flex-direction:column; align-items:stretch; gap:8px; }
      .screener-stats { margin-left:0; text-align:center; }
      .card { padding:14px; }
      table { font-size:11px; }
      th { padding:6px 6px; font-size:10px; }
      td { padding:6px 6px; }
      .dg { grid-template-columns:1fr; }
      .filter-btn { padding:6px 12px; font-size:12px; }
      .pagination { flex-wrap:wrap; }
    }
    @media(max-width:480px){
      .metrics-grid { grid-template-columns:1fr; }
      .metric-card { padding:12px; }
      .header { flex-direction:column; align-items:flex-start; }
    }
  </style>
</head>

const PORTFOLIO = {
  current_drawdown:-0.1007, annualized_return:0.4318,

const DEFINITIONS = [
  ["Signal (Buy/Sell)", "The model's current recommendation. Buy means the combined timing signal is above the buy threshold; Sell means it's below the sell threshold. Hold (carry previous signal) when between thresholds."],
  ["Call Strength", "The raw value of the combined timing signal. Positive values lean toward Buy, negative toward Sell. Magnitude indicates conviction; values near zero are weak signals."],
  ["Vol/Price Mix", "The blend weight between volume ratio and price slope in the combined signal. 0 = 100% price, 1 = 100% volume. Each asset has its own optimized mix (e.g., AVGO uses 0.15, TPR uses 0.98)."],
  ["Vol Flag", "Controls the moving average window for the volume ratio calculation. 0 = 1-day (raw), 1 = 50-day, 2 = 100-day, 3 = 120-day. Longer windows smooth out noise but react slower."],

  ["Buy/Sell Threshold", "The combined signal level that triggers a Buy or Sell. When the signal crosses above the buy threshold, the model goes long. When it crosses below the sell threshold, it goes to cash. Each asset has its own tuned thresholds."],
  ["Last Yr Return", "The asset's total return over the most recent 252 trading days (approx 1 year), using the trading strategy (not buy-and-hold)."],
  ["Avg Yr Return (Annualized)", "The compound annual growth rate (CAGR) over the full evaluation period (default 5 years) using the trading strategy."],
  ["Est Next Yr Return", "A simple estimate: (Last Year Return + Average Yearly Return) / 2. This blends recent momentum with long-term average performance."],
  ["Current Loss (Drawdown)", "How far the asset's trading balance is currently below its all-time high. 0% means at or near peak. -25% means 25% below peak."],
  ["Stat3 Loss", "The statistically expected worst-case loss: Average Loss + 3x Standard Deviation of losses. An engineering design-point approach where over 99% of observed losses fall within this bound. More reliable than max loss, which may reflect a one-time black swan event."],
  ["Max Loss", "The worst peak-to-trough drawdown observed during the evaluation period. Can be misleading if it reflects a single extreme event rather than typical behavior (see Stat3 Loss)."],
  ["Recovery Period", "Estimated years to recover from the maximum loss, given the average yearly return. Formula: -2 x ln(1 + maxLoss) / ln(1 + avgYearlyReturn). Lower is better. 'Never' means the average return is negative, so the asset cannot mathematically recover."],
  ["Market Cap", "Total market capitalization (share price x shares outstanding). Useful for filtering out micro-cap / penny stocks susceptible to pump-and-dump. Sourced from Yahoo Finance."],
  ["Optimizer (Two-Stage Search)", "The parameter optimizer uses a two-pass grid search. Stage 1 does a coarse sweep across wide ranges (thresholds -0.1 to +0.1, mix 0-1 in 0.1 steps, all vol/price flag combos) \u2014 ~7,200 combinations. Stage 2 takes the top 10 results and refines with a tight grid around each (threshold \u00B10.01 in 0.0005 steps, mix \u00B10.1 in 0.02 steps) \u2014 ~4,000-5,000 more. Total ~11,000 evaluations covering a 10\u00D7 wider search space than single-pass."],
  ["Asymmetric Thresholds", "When enabled, Stage 2 tests 7 sell-threshold offsets around each buy threshold (-0.01, -0.005, -0.002, 0, +0.002, +0.005, +0.01), allowing different entry and exit signal levels. For example, buy at -0.02 but sell at -0.03. Stage 1 stays symmetric. Marked with [asym] in results and 'A' badge in the Params table."],
  ["Train/Test Split", "The optimizer splits the evaluation period 80/20. Parameters are optimized on the first 80% of data (training set) and then evaluated on the remaining 20% (test set). If the test return is far below the training return, the parameters may be overfit to historical noise. Both metrics are reported in the result line."],
  ["Walk-Forward Validation (WF)", "After optimization, an N-fold rolling cross-validation (up to 4 folds, min 1 year each). For each fold, trains on all prior folds and tests on the current one. The average out-of-sample return is reported as 'WF: X.X% (N folds)'. More robust than a single train/test split because it tests across multiple time periods. Green in the Params table if \u2265 50% of train return, red if below."],
  ["Max Recovery Constraint", "An optimizer input (default 5 years) that filters candidate parameter sets. Only combinations whose estimated recovery period is at or below this limit are considered. If none pass, the optimizer falls back to all results with positive recovery. Tighter values (e.g. 3 years) favor conservative, low-drawdown configurations; looser values allow higher-return / higher-risk configurations."],
  ["Overfitting Flag", "A red '!' warning shown in the Params table when a ticker's test return is less than 50% of its training return. Indicates the optimized parameters may be curve-fit to historical noise rather than capturing genuine signal. The row is highlighted red and the Test Ret column turns red. Check the WF Avg column for a second opinion."],
  ["Portfolio Optimization", "Optimizes params across all tickers simultaneously to maximize the portfolio-level Sharpe ratio (return / |max drawdown|). Generates top-3 param candidates per ticker via coarse grid, pre-computes daily balance series, then uses greedy coordinate descent to find the combination that maximizes the equal-weight portfolio's risk-adjusted return. Considers correlations implicitly \u2014 tickers with uncorrelated returns are favored."],
  ["Sharpe Ratio (Portfolio)", "Used by the Portfolio Optimizer as the objective function: annualized portfolio return divided by the absolute value of the maximum drawdown. Higher is better. Unlike the traditional Sharpe ratio (which uses volatility), this variant penalizes deep drawdowns directly, aligning with the model's focus on recovery period and loss management."],
  ["Optimize All", "Queues optimization for every ticker in the portfolio sequentially. Each ticker runs the full two-stage optimizer with the current Max Recovery and Asymmetric Thresholds settings. Progress is shown with a bar and current ticker name. Results are staged (not saved) until you click Commit All."],
  ["Commit / Commit All", "Saves staged parameter changes to GitHub via the save_params API. Commit saves a single ticker; Commit All saves all tickers in one pass. Changes are written to data/ticker_params.json in the repository and take effect on the next Vercel deploy (~30 seconds). Revert restores a ticker's params to the last committed version."],
  ["Export / Import", "Export downloads all current ticker params as a JSON file for backup. Import loads a previously exported JSON file, replacing all current params. Useful for comparing parameter sets or restoring after a bad optimization run."],
  ["Last Optimized", "The date when a ticker's parameters were last optimized. Shown in the Params table to help identify stale params that may need re-optimization after new market data arrives."],
  ["Train Recovery / Test Recovery", "The estimated recovery period calculated separately for the training set (first 80% of data) and the test set (last 20%). A large gap between train and test recovery is a strong overfitting signal. For example, Train Rec: 2yr but Test Rec: 999yr means the params worked well historically but failed on unseen data. The recovery blows up because the test return is near-zero or negative, making mathematical recovery impossible. When you see this pattern, the optimized parameters are likely curve-fit to specific market conditions in the training period."],
];

// ── CHC Trading Model (JavaScript port) ─────────────────────────────────────

function computeCHCModel(dates, closes, volumes, opts) {
  const {
    volFlag = 2, priceFlag = 1, volPriceMix = 0.72,
    buyThreshold = 0.0012, sellThreshold = -0.0012, evalYears = 5,
  } = opts || {};

  const n = closes.length;
  if (n < 130) return { error: "Not enough data (need 130+ days)" };

  // Trim to eval period
  const evalDays = evalYears * 252;
  let startTrim = 0;
  if (n > evalDays) startTrim = n - evalDays;
  const cl = closes.slice(startTrim);
  const vo = volumes.slice(startTrim);
  const dt = dates.slice(startTrim);
  const N = cl.length;

  const maWindows = { 0:1, 1:50, 2:100, 3:120 };
  const volWindow = maWindows[volFlag] || 100;
  const priceWindow = maWindows[priceFlag] || 50;
  const lookback = Math.max(volWindow, priceWindow, 5);

  // Volume up/down
  const vud = new Float64Array(N);
  vud[0] = vo[0];
  for (let i = 1; i < N; i++) {
    vud[i] = cl[i] >= cl[i-1] ? vo[i] : -vo[i];
  }

  // Volume ratio
  const vr = new Float64Array(N).fill(1);
  for (let i = volWindow; i < N; i++) {
    let ss = 0, as = 0;
    for (let j = i - volWindow + 1; j <= i; j++) { ss += vud[j]; as += vo[j]; }
    if (as > 0) vr[i] = ss / as;
  }

  // Price MA
  const pma = new Float64Array(N);
  for (let i = 0; i < N; i++) pma[i] = cl[i];
  for (let i = priceWindow; i < N; i++) {
    let s = 0;
    for (let j = i - priceWindow + 1; j <= i; j++) s += cl[j];
    pma[i] = s / priceWindow;
  }

  // Price slope
  const ps = new Float64Array(N);
  for (let i = 4; i < N; i++) {
    const mid = pma[i-2] || 1;
    ps[i] = (pma[i] - pma[i-4]) / mid;
  }

  // Combined signal
  const comb = new Float64Array(N);
  for (let i = 0; i < N; i++) comb[i] = volPriceMix * vr[i] + (1 - volPriceMix) * ps[i];

  // Generate signals & track balances
  const signals = new Array(N).fill("Hold");
  const bal = new Float64Array(N);
  const shares = new Float64Array(N);
  const bhBal = new Float64Array(N);
  const initBal = 100000;
  const si = lookback;

  bal[si] = initBal;
  shares[si] = initBal / cl[si];
  signals[si] = "Buy";
  const bhShares = cl[si] > 0 ? initBal / cl[si] : 0;

  for (let i = si; i < N; i++) bhBal[i] = bhShares * cl[i];

  for (let i = si + 1; i < N; i++) {
    if (comb[i] >= buyThreshold) signals[i] = "Buy";
    else if (comb[i] <= sellThreshold) signals[i] = "Sell";
    else signals[i] = signals[i-1];

    const traded = signals[i] !== signals[i-1];

    if (signals[i] === "Buy") {
      if (traded) {
        shares[i] = cl[i] > 0 ? bal[i-1] / cl[i] : 0;
        bal[i] = shares[i] * cl[i];
      } else {
        shares[i] = shares[i-1];
        bal[i] = shares[i] * cl[i];
      }
    } else if (signals[i] === "Sell") {
      if (traded) {
        bal[i] = shares[i-1] * cl[i];
        shares[i] = 0;
      } else {
        shares[i] = 0;
        bal[i] = bal[i-1];
      }
    } else {
      shares[i] = shares[i-1];
      bal[i] = shares[i] > 0 ? shares[i] * cl[i] : bal[i-1];
    }
  }

  // Metrics helper
  function calcMetrics(b, start) {
    const vals = [];
    for (let i = start; i < b.length; i++) if (b[i] > 0) vals.push(b[i]);
    if (vals.length < 2) return {};
    let maxB = vals[0];
    const dd = vals.map(v => { maxB = Math.max(maxB, v); return v / maxB - 1; });
    const lastYrDays = Math.min(252, vals.length - 1);
    const lastYrRet = vals[vals.length-1] / vals[vals.length - 1 - lastYrDays] - 1;
    const yrsElapsed = vals.length / 252;
    const avgYrRet = yrsElapsed > 0 && vals[0] > 0 ? Math.pow(vals[vals.length-1] / vals[0], 1/yrsElapsed) - 1 : 0;
    const currentLoss = dd[dd.length-1];
    const maxLoss = Math.min(...dd);
    const avgLoss = dd.reduce((a,b)=>a+b,0) / dd.length;
    const variance = dd.reduce((a,v)=>a+(v-avgLoss)**2,0) / dd.length;
    const stdLoss = Math.sqrt(variance);
    const stat3Loss = avgLoss - 3 * stdLoss;
    let recovery = 0;
    if (maxLoss < 0 && avgYrRet > 0) recovery = -2 * Math.log(1 + maxLoss) / Math.log(1 + avgYrRet);
    else if (maxLoss < 0 && avgYrRet <= 0) recovery = 999;
    return {
      last_yr_return: +lastYrRet.toFixed(6), avg_yr_return: +avgYrRet.toFixed(6),
      current_loss: +currentLoss.toFixed(6), max_loss: +maxLoss.toFixed(6),
      avg_loss: +avgLoss.toFixed(6), stat3_loss: +stat3Loss.toFixed(6),
      recovery_period: +recovery.toFixed(2),
    };
  }

  const trading = calcMetrics(bal, si);
  const buyHold = calcMetrics(bhBal, si);
  const callStrength = comb[N-1] || 0;
  const buySignal = signals[N-1] || "Hold";
  const estNextYr = trading.last_yr_return != null ? (trading.last_yr_return + trading.avg_yr_return) / 2 : 0;

  // Downsample chart
  const step = Math.max(1, Math.floor((N - si) / 500));
  const chartDates = [], chartTrading = [], chartBH = [];
  const chartSignal = [], chartDrawdown = [], chartBHDrawdown = [];
  let peakBal = bal[si] || initBal, peakBH = bhBal[si] || initBal;
  for (let i = si; i < N; i += step) {
    chartDates.push(dt[i]);
    chartTrading.push(Math.round(bal[i]));
    chartBH.push(Math.round(bhBal[i]));
    chartSignal.push(+comb[i].toFixed(6));
    peakBal = Math.max(peakBal, bal[i]);
    peakBH = Math.max(peakBH, bhBal[i]);
    chartDrawdown.push(peakBal > 0 ? +((bal[i] / peakBal - 1) * 100).toFixed(2) : 0);
    chartBHDrawdown.push(peakBH > 0 ? +((bhBal[i] / peakBH - 1) * 100).toFixed(2) : 0);
  }

  // Trade log — record each buy/sell transition
  const trades = [];
  let entryDate = null, entryPrice = 0, entryIdx = 0;
  for (let i = si + 1; i < N; i++) {
    if (signals[i] === "Buy" && signals[i-1] !== "Buy") {
      entryDate = dt[i]; entryPrice = cl[i]; entryIdx = i;
    }
    if (signals[i] !== "Buy" && signals[i-1] === "Buy" && entryDate) {
      const exitPrice = cl[i];
      const ret = entryPrice > 0 ? (exitPrice / entryPrice - 1) : 0;
      const days = i - entryIdx;
      trades.push({
        entry_date: entryDate, exit_date: dt[i],
        entry_price: +entryPrice.toFixed(2), exit_price: +exitPrice.toFixed(2),
        return_pct: +ret.toFixed(4), days,
      });
      entryDate = null;
    }
  }
  // Open trade (still holding)
  if (entryDate && signals[N-1] === "Buy") {
    const ret = entryPrice > 0 ? (cl[N-1] / entryPrice - 1) : 0;
    trades.push({
      entry_date: entryDate, exit_date: null,
      entry_price: +entryPrice.toFixed(2), exit_price: +cl[N-1].toFixed(2),
      return_pct: +ret.toFixed(4), days: N - 1 - entryIdx, open: true,
    });
  }

  // Trade statistics
  const closedTrades = trades.filter(t => !t.open);
  const wins = closedTrades.filter(t => t.return_pct > 0);
  const losses = closedTrades.filter(t => t.return_pct <= 0);
  const totalDaysInMarket = trades.reduce((s, t) => s + t.days, 0);
  const totalTradingDays = N - si;
  const tradeStats = {
    total_trades: trades.length,
    closed_trades: closedTrades.length,
    win_rate: closedTrades.length > 0 ? wins.length / closedTrades.length : 0,
    avg_win: wins.length > 0 ? wins.reduce((s, t) => s + t.return_pct, 0) / wins.length : 0,
    avg_loss: losses.length > 0 ? losses.reduce((s, t) => s + t.return_pct, 0) / losses.length : 0,
    best_trade: closedTrades.length > 0 ? Math.max(...closedTrades.map(t => t.return_pct)) : 0,
    worst_trade: closedTrades.length > 0 ? Math.min(...closedTrades.map(t => t.return_pct)) : 0,
    avg_holding_days: closedTrades.length > 0 ? Math.round(closedTrades.reduce((s, t) => s + t.days, 0) / closedTrades.length) : 0,
    time_in_market: totalTradingDays > 0 ? totalDaysInMarket / totalTradingDays : 0,
  };

  return {
    buy_sell_call: buySignal, call_strength: +callStrength.toFixed(6),
    est_next_yr_return: +estNextYr.toFixed(6),
    eval_period_start: dt[si] || "", eval_period_end: dt[N-1] || "",
    eval_years: evalYears, trading, buy_hold: buyHold,
    params: { vol_price_mix: volPriceMix, buy_threshold: buyThreshold, sell_threshold: sellThreshold },
    chart: { dates: chartDates, trading_balance: chartTrading, bh_balance: chartBH,
             signal: chartSignal, drawdown: chartDrawdown, bh_drawdown: chartBHDrawdown },
    trades, tradeStats,
  };
}

// ── Yahoo Finance fetch via CORS proxies ────────────────────────────────────

function parseYahooChart(json, symbol) {
  const result = json.chart.result[0];
  const ts = result.timestamp;
  const q = result.indicators.quote[0];
  const adj = result.indicators.adjclose ? result.indicators.adjclose[0].adjclose : q.close;
  const dates = [], closes = [], volumes = [];
  for (let i = 0; i < ts.length; i++) {
    const c = adj ? (adj[i] || q.close[i]) : q.close[i];
    const v = q.volume[i];
    if (c != null && v != null) {
      dates.push(new Date(ts[i] * 1000).toISOString().slice(0,10));
      closes.push(c);
      volumes.push(v);
    }
  }
  return { dates, closes, volumes, name: result.meta.shortName || result.meta.symbol || symbol };
}

async function fetchYahooData(symbol, years) {
  // Try Vercel serverless API first (works when deployed to Vercel)
  try {
    const apiUrl = `/api/yahoo?symbol=${encodeURIComponent(symbol)}&years=${years + 1}`;
    const res = await fetch(apiUrl, { signal: AbortSignal.timeout(15000) });
    if (res.ok) {
      const data = await res.json();
      if (data.dates && data.dates.length > 0) {
        return { dates: data.dates, closes: data.closes, volumes: data.volumes, name: data.name || symbol };
      }
      if (data.error) return { error: data.error };
    }
  } catch (e) { /* Fall through to CORS proxies */ }

  // Fallback: CORS proxies (for GitHub Pages or local dev)
  const end = Math.floor(Date.now() / 1000);
  const start = end - years * 365 * 86400 - 30 * 86400;
  const yfUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?period1=${start}&period2=${end}&interval=1d`;

  const proxies = [
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    url => url,
  ];

  for (const makeProxy of proxies) {
    try {
      const fetchUrl = makeProxy(yfUrl);
      const res = await fetch(fetchUrl, { signal: AbortSignal.timeout(10000) });
      if (!res.ok) continue;
      const json = await res.json();
      if (json.chart && json.chart.result && json.chart.result[0]) {
        return parseYahooChart(json, symbol);
      }
    } catch (e) { continue; }
  }

  return { error: `Could not fetch live data for ${symbol}. Screener summary data may be available.` };
}

async function fetchProfile(symbol) {
  try {
    const res = await fetch(`/api/yahoo_profile?symbol=${encodeURIComponent(symbol)}`, { signal: AbortSignal.timeout(10000) });
    if (res.ok) return await res.json();
  } catch (e) { /* silent */ }
  return null;
}

const pct = (v, dec=1) => v == null || isNaN(v) ? "\u2014" : (v*100).toFixed(dec)+"%";
const pc = v => v >= 0 ? "pos" : "neg";
const rc = v => v <= 2 ? "rl" : v <= 4 ? "rm" : v <= 6 ? "rh" : "rc";
const dlr = v => v == null ? "\u2014" : "$"+v.toLocaleString("en-US",{maximumFractionDigits:0});
const fmtCap = v => { if (v == null || isNaN(v) || v === 0) return "\u2014"; if (v >= 1e12) return "$"+(v/1e12).toFixed(1)+"T"; if (v >= 1e9) return "$"+(v/1e9).toFixed(1)+"B"; if (v >= 1e6) return "$"+(v/1e6).toFixed(0)+"M"; return "$"+(v/1e3).toFixed(0)+"K"; };


// ── SVG Chart ───────────────────────────────────────────────────────────────
function Chart({ data, width: propWidth, height, lines, xKey, yFormat, topPad, regions, hLines }) {
  const [tip, setTip] = useState(null);
  const ref = useRef(null);
  const containerRef = useRef(null);
  const [autoWidth, setAutoWidth] = useState(propWidth || 900);
  useEffect(() => {
    if (containerRef.current) {
      const ro = new ResizeObserver(entries => { for (const e of entries) setAutoWidth(Math.floor(e.contentRect.width)); });
      ro.observe(containerRef.current);
      setAutoWidth(containerRef.current.offsetWidth);
      return () => ro.disconnect();
    }
  }, []);
  const width = propWidth || autoWidth;
  const p = {t:topPad||20,r:20,b:40,l:70};
  const w = width-p.l-p.r, h2 = height-p.t-p.b;
  if (!data || !data.length) return null;

  let allV = [];
  lines.forEach(l => data.forEach(d => { if(d[l.key]!=null) allV.push(d[l.key]); }));
  const mn = Math.min(...allV), mx = Math.max(...allV), rng = mx-mn||1;
  const xS = i => p.l+(i/(data.length-1))*w;
  const yS = v => p.t+h2-((v-mn)/rng)*h2;

  const paths = lines.map(l => {
    let d="";
    data.forEach((pt,i) => { const v=pt[l.key]; if(v!=null){const x=xS(i),y=yS(v); d+=(d===""?`M${x},${y}`:` L${x},${y}`);} });
    return {...l,d};
  });

  const yT = []; for(let i=0;i<=5;i++){const v=mn+(rng/5)*i; yT.push({v,y:yS(v)});}
  const xT = []; const xs=Math.max(1,Math.floor(data.length/6));
  for(let i=0;i<data.length;i+=xs) xT.push({i,x:xS(i),label:data[i][xKey]?data[i][xKey].substring(0,7):""});

  const onMM = e => {
    const r2=ref.current.getBoundingClientRect();
    const mx2=e.clientX-r2.left-p.l;
    const idx=Math.round((mx2/w)*(data.length-1));
    if(idx>=0&&idx<data.length) setTip({idx,x:e.clientX-r2.left,y:e.clientY-r2.top});
  };

  return (
    <div className="cc" ref={containerRef} style={{width:propWidth||"100%"}}>
      <svg ref={ref} width={width} height={height} onMouseMove={onMM} onMouseLeave={()=>setTip(null)}>
        {regions && regions.map((reg, ri) => {
          // Find data indices for region start/end
          let si = 0, ei = data.length - 1;
          for (let i = 0; i < data.length; i++) { if (data[i][xKey] >= reg.startDate) { si = i; break; } }
          for (let i = data.length - 1; i >= 0; i--) { if (!reg.endDate || data[i][xKey] <= reg.endDate) { ei = i; break; } }
          if (si > ei) return null;
          const rx = xS(si), rw = xS(ei) - xS(si);
          return <g key={"reg"+ri}>
            <rect x={rx} y={p.t} width={Math.max(rw,1)} height={h2} fill={reg.color} opacity={0.08}/>
            <line x1={rx} y1={p.t} x2={rx} y2={p.t+h2} stroke={reg.color} strokeWidth={1} opacity={0.3} strokeDasharray="4,4"/>
            <text x={rx + rw/2} y={p.t+12} textAnchor="middle" fill={reg.color} fontSize="9" opacity={0.7}>{reg.label}</text>
          </g>;
        })}
        {hLines && hLines.map((hl,i) => {
          const hy = yS(hl.value);
          if (hy >= p.t + h2 || hy <= p.t) return null;
          return <g key={"hl"+i}>
            <line x1={p.l} y1={hy} x2={width-p.r} y2={hy} stroke={hl.color||"#9498a8"} strokeWidth={hl.width||1} strokeDasharray={hl.dash||"6,3"} opacity={hl.opacity||0.8}/>
            {hl.label && <text x={width-p.r+4} y={hy+3} fill={hl.color||"#9498a8"} fontSize="9">{hl.label}</text>}
          </g>;
        })}
        {yT.map((t,i)=><line key={i} x1={p.l} y1={t.y} x2={width-p.r} y2={t.y} stroke="#2e3348" strokeWidth="1" strokeDasharray="4,4"/>)}
        {yT.map((t,i)=><text key={"yl"+i} x={p.l-8} y={t.y+4} textAnchor="end" fill="#9498a8" fontSize="11">{yFormat ? yFormat(t.v) : "$"+(t.v/1000).toFixed(0)+"k"}</text>)}
        {xT.map((t,i)=><text key={"xl"+i} x={t.x} y={height-8} textAnchor="middle" fill="#9498a8" fontSize="10">{t.label}</text>)}
        {paths.map((q,i)=><path key={i} d={q.d} fill="none" stroke={q.color} strokeWidth={q.width||2} opacity={q.opacity||1}/>)}
        {tip&&<line x1={xS(tip.idx)} y1={p.t} x2={xS(tip.idx)} y2={p.t+h2} stroke="#9498a8" strokeWidth="1" strokeDasharray="3,3"/>}
      </svg>
      {tip&&tip.idx<data.length&&(
        <div className="ctt" style={{left:Math.min(tip.x+12,width-160),top:20}}>
          <div style={{color:"#9498a8",marginBottom:4}}>{data[tip.idx][xKey]}</div>
          {lines.map((l,i)=><div key={i} style={{color:l.color}}>{l.label}: {yFormat ? yFormat(data[tip.idx][l.key]) : dlr(data[tip.idx][l.key])}</div>)}
        </div>
      )}
      <div className="cl">{lines.map((l,i)=><div key={i} className="cli"><div className="cld" style={{background:l.color}}/>{l.label}</div>)}</div>
    </div>
  );
}

      <div className="metric-card"><div className="metric-label">As of Date</div><div className="metric-value" style={{fontSize:18}}>{p2.as_of_date}</div><div className="metric-sub">Last model update</div></div>

function StrengthBar({value}) {
  const av=Math.min(Math.abs(value),1), ip=value>=0, co=ip?"var(--green)":"var(--red)";
  const lf=ip?"50%":(50-av*50)+"%", wd=(av*50)+"%";
  return (
    <div className="sb">
      <div className="st"><div style={{position:"absolute",left:"50%",top:0,width:1,height:"100%",background:"var(--text2)",opacity:0.3}}/><div className="sf" style={{left:lf,width:wd,background:co}}/></div>
      <span style={{fontSize:12,color:co,fontWeight:600,minWidth:40,textAlign:"right"}}>{value>=0?"+":""}{value.toFixed(2)}</span>
    </div>
  );
}

function exportCSV(rows, columns, filename) {
  const header = columns.map(c => c.label).join(",");
  const body = rows.map(r => columns.map(c => {
    let v = r[c.field];
    if (v == null) return "";
    if (typeof v === "string") return '"' + v.replace(/"/g, '""') + '"';
    return v;
  }).join(",")).join("\n");
  const blob = new Blob([header + "\n" + body], {type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

function SummaryTable({tickers,onSelect,sortCfg,onSort}) {
  const sorted = useMemo(() => {
    const {key,dir}=sortCfg;
    return [...tickers].sort((a,b)=>{
      const av2=a[key]!=null?a[key]:0, bv=b[key]!=null?b[key]:0;
      if(typeof av2==="string") return dir*av2.localeCompare(bv);
      return dir*(av2-bv);
    });
  },[tickers,sortCfg]);

  const SH = ({label,field}) => {
    const active=sortCfg.key===field;
    return <th onClick={()=>onSort(field)} title={COL_TIPS[field]||""}>{label}<span className="sa">{active?(sortCfg.dir===1?"\u25B2":"\u25BC"):"\u21C5"}</span></th>;
  };

  return (
    <div className="table-wrap"><table><thead><tr>
      <SH label="Ticker" field="ticker"/><SH label="Signal" field="buy_sell_call"/>
      <SH label="Strength" field="call_strength"/><SH label="Sector" field="sector"/>
      <SH label="Mkt Cap" field="market_cap"/><SH label="Last Yr" field="last_yr_return"/>
      <SH label="Avg Yr" field="av_yrly_return"/><SH label="Est Next Yr" field="est_next_yr_return"/>
      <SH label="Current Loss" field="current_loss"/><SH label="Stat3 Loss" field="stat3_loss"/>
      <SH label="Recovery (yrs)" field="recovery_period"/>
    </tr></thead><tbody>
      {sorted.map(t=>(
        <tr key={t.ticker} onClick={()=>onSelect(t.ticker)} style={{cursor:"pointer"}}>
          <td className="tc">{t.ticker}</td>
          <td className={t.buy_sell_call==="Buy"?"buy":"sell"}>{t.buy_sell_call}</td>
          <td><StrengthBar value={t.call_strength}/></td>
          <td style={{color:"var(--text2)",fontSize:11,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.sector||"\u2014"}</td>
          <td style={{color:"var(--text2)",fontSize:12}}>{fmtCap(t.market_cap)}</td>
          <td className={pc(t.last_yr_return)}>{pct(t.last_yr_return)}</td>
          <td className={pc(t.av_yrly_return)}>{pct(t.av_yrly_return)}</td>
          <td className={pc(t.est_next_yr_return)}>{pct(t.est_next_yr_return)}</td>

          <td className={t.recovery_period>=999?"neg":rc(t.recovery_period)}>{t.recovery_period>=999?"Never":t.recovery_period.toFixed(1)}</td>
        </tr>
      ))}
    </tbody></table></div>
  );
}

                    <div className="dr"><span>PEG Ratio</span><span>{fmtN(ks.peg_ratio)}</span></div>

                  <div>

                    <div className="dr"><span>Free Cash Flow</span><span style={{color:f.free_cash_flow > 0 ? "var(--green)" : "var(--red)"}}>{fmtB(f.free_cash_flow)}</span></div>
                    <div className="dr"><span>Operating CF</span><span>{fmtB(f.operating_cash_flow)}</span></div>

                    <div className="dr"><span>Current Ratio</span><span>{fmtN(f.current_ratio)}</span></div>
                    <div className="dr"><span>Return on Equity</span><span>{fmtPct(f.return_on_equity)}</span></div>
                    <div className="dr"><span>Beta</span><span>{fmtN(ks.beta, 2)}</span></div>
                    <div className="dr"><span>Short % Float</span><span>{fmtPct(ks.short_pct_float)}</span></div>
                  </div>
                </div>

                {/* Analyst Target */}
                {f.target_mean_price && (
                  <div style={{marginTop:12,padding:"8px 14px",background:"var(--bg3)",borderRadius:6,display:"flex",gap:20,alignItems:"center",fontSize:12,flexWrap:"wrap"}}>
                    <span style={{color:"var(--text2)"}}>Analyst Consensus:</span>
                    <span style={{fontWeight:600,color:"var(--blue)",textTransform:"capitalize"}}>{f.recommendation || "\u2014"}</span>

                    {f.current_price && <span style={{color: f.target_mean_price > f.current_price ? "var(--green)" : "var(--red)"}}>
                      ({((f.target_mean_price / f.current_price - 1) * 100).toFixed(1)}% {f.target_mean_price > f.current_price ? "upside" : "downside"})
                    </span>}
                    {f.analyst_count && <span style={{color:"var(--text2)"}}>({f.analyst_count} analysts)</span>}
                  </div>
                )}
              </div>
            )}

            {/* Recent News */}
            {p.news && p.news.length > 0 && (
              <div className="card">
                <div className="card-title">Recent News</div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {p.news.map((n, i) => (

                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        );
      })()}
    </div>
  );
}


// ── Portfolio Builder ────────────────────────────────────────────────────

function PortfolioBuilder({screenerData, onSelect}) {
  const [constraints, setConstraints] = useState({
    maxAssets: 10, recoveryMax: 5, marketCapMin: 1e9, avgYrMin: 0, sector: "", signalFilter: "buy", rankBy: "av_yrly_return", backtestYrs: 5,
  });
  const [portfolio, setPortfolio] = useState(null);
  const [building, setBuilding] = useState(false);
  const [progress, setProgress] = useState("");
  const [failedTickers, setFailedTickers] = useState([]);
  const setC = (k, v) => setConstraints(prev => ({...prev, [k]: v}));

  const sectors = screenerData && screenerData.results
    ? [...new Set(screenerData.results.map(t => t.sector).filter(Boolean))].sort() : [];

  const buildPortfolio = async () => {
    if (!screenerData || !screenerData.results) return;
    setBuilding(true);
    setPortfolio(null);
    setFailedTickers([]);

    // 1. Filter candidates
    let candidates = screenerData.results.filter(t => {
      if (t.recovery_period == null || t.recovery_period >= 999) return false;
      if (constraints.recoveryMax && t.recovery_period > constraints.recoveryMax) return false;
      if (constraints.marketCapMin && (t.market_cap || 0) < constraints.marketCapMin) return false;
      if (constraints.avgYrMin && (t.av_yrly_return || 0) < constraints.avgYrMin / 100) return false;
      if (constraints.sector && t.sector !== constraints.sector) return false;
      if (constraints.signalFilter === "buy" && t.buy_sell_call !== "Buy") return false;
      return true;
    });

    // 2. Sort by ranking metric and take top N
    const rankKey = constraints.rankBy;
    candidates.sort((a, b) => (b[rankKey] || 0) - (a[rankKey] || 0));
    const selected = candidates.slice(0, constraints.maxAssets);

    if (selected.length === 0) {
      setProgress("No tickers match your constraints. Try relaxing the filters.");
      setBuilding(false);
      return;
    }

    const weight = 1 / selected.length;

    // 3. Fetch price history for each ticker + SPY
    const priceData = {};
    const failed = [];
    const syms = [...selected.map(t => t.ticker), "SPY"];
    for (let i = 0; i < syms.length; i++) {
      const sym = syms[i];
      setProgress("Fetching price data: " + (i + 1) + "/" + syms.length + " (" + sym + ")...");
      try {
        const d = await fetchYahooData(sym, constraints.backtestYrs);
        if (d && d.dates && d.dates.length > 100) {
          priceData[sym] = {dates: d.dates, closes: d.closes};
        } else {
          failed.push(sym);
        }
      } catch (e) { failed.push(sym); }
    }
    if (failed.length > 0) setFailedTickers(failed);

    // 4. Align dates — find common date set
    const dateSets = Object.values(priceData).map(d => new Set(d.dates));
    if (dateSets.length === 0) {
      setProgress("Could not fetch price data. Try again.");
      setBuilding(false);
      return;
    }
    let commonDates = dateSets[0];
    for (let i = 1; i < dateSets.length; i++) {
      commonDates = new Set([...commonDates].filter(d => dateSets[i].has(d)));
    }
    const sortedDates = [...commonDates].sort();
    if (sortedDates.length === 0) {
      setProgress("No overlapping dates found for selected tickers.");
      setBuilding(false);
      return;
    }

    // 5. Build price lookup and compute portfolio
    const initBalance = 100000;
    const chartData = [];
    let portPeak = initBalance;
    let portMaxDD = 0;
    let spyPeak = initBalance;
    let spyMaxDD = 0;

    // Get start prices for normalization
    const startPrices = {};
    for (const sym of Object.keys(priceData)) {
      const idx = priceData[sym].dates.indexOf(sortedDates[0]);
      startPrices[sym] = idx >= 0 ? priceData[sym].closes[idx] : 1;
    }

    for (const date of sortedDates) {
      // Portfolio value: equal-weight sum of normalized returns
      let portValue = 0;
      let validCount = 0;
      for (const t of selected) {
        const sym = t.ticker;
        if (!priceData[sym]) continue;
        const idx = priceData[sym].dates.indexOf(date);
        if (idx < 0) continue;
        const ret = priceData[sym].closes[idx] / startPrices[sym];
        portValue += ret * weight;
        validCount++;
      }
      if (validCount > 0) portValue = portValue * initBalance;
      else portValue = chartData.length > 0 ? chartData[chartData.length - 1].portfolio : initBalance;

      // SPY value
      let spyValue = initBalance;
      if (priceData["SPY"]) {
        const idx = priceData["SPY"].dates.indexOf(date);
        if (idx >= 0) spyValue = (priceData["SPY"].closes[idx] / startPrices["SPY"]) * initBalance;
      }

      portPeak = Math.max(portPeak, portValue);
      spyPeak = Math.max(spyPeak, spyValue);
      portMaxDD = Math.min(portMaxDD, (portValue / portPeak) - 1);
      spyMaxDD = Math.min(spyMaxDD, (spyValue / spyPeak) - 1);

      chartData.push({date, portfolio: Math.round(portValue), spy: Math.round(spyValue)});
    }

    // 6. Compute metrics
    const years = sortedDates.length / 252;
    const finalPort = chartData[chartData.length - 1].portfolio;
    const finalSpy = chartData[chartData.length - 1].spy;
    const portAnn = years > 0 ? Math.pow(finalPort / initBalance, 1 / years) - 1 : 0;
    const spyAnn = years > 0 ? Math.pow(finalSpy / initBalance, 1 / years) - 1 : 0;
    const portRecovery = portMaxDD < 0 && portAnn > 0 ? -2 * Math.log(1 + portMaxDD) / Math.log(1 + portAnn) : 0;

    // Downsample chart for performance
    const step = Math.max(1, Math.floor(chartData.length / 500));
    const downsampled = chartData.filter((_, i) => i % step === 0 || i === chartData.length - 1);

    setPortfolio({
      selected: selected.map(t => ({...t, weight: Math.round(weight * 10000) / 100})),
      metrics: {portAnn, spyAnn, portMaxDD, spyMaxDD, portRecovery, years: years.toFixed(1), dataPoints: sortedDates.length},
      chartData: downsampled,
    });
    setProgress("");
    setBuilding(false);
  };

  return (
    <div>
      <div className="card" style={{padding:"16px 20px"}}>
        <div className="card-title" style={{marginBottom:12}}>Portfolio Builder</div>
        <div style={{fontSize:12,color:"var(--text2)",marginBottom:16}}>Auto-select optimal buy-and-hold portfolio from {screenerData ? screenerData.total_tickers.toLocaleString() : "..."} screener tickers</div>
        <div className="controls" style={{flexWrap:"wrap",gap:12}}>
          <div className="cg"><label style={{fontSize:10}}>Max Assets</label>
            <select value={constraints.maxAssets} onChange={e => setC("maxAssets", Number(e.target.value))} style={{width:70}}>
              <option value={5}>5</option><option value={10}>10</option><option value={15}>15</option><option value={20}>20</option>
            </select>
          </div>
          <div className="cg"><label style={{fontSize:10}}>Max Recovery (yrs)</label>
            <input type="number" value={constraints.recoveryMax} onChange={e => setC("recoveryMax", Number(e.target.value))} step={0.5} style={{width:70,fontSize:12}}/>
          </div>
          <div className="cg"><label style={{fontSize:10}}>Min Market Cap</label>
            <select value={constraints.marketCapMin} onChange={e => setC("marketCapMin", Number(e.target.value))} style={{width:90,fontSize:12}}>
              <option value={0}>Any</option><option value={1e8}>$100M+</option><option value={1e9}>$1B+</option><option value={1e10}>$10B+</option><option value={1e11}>$100B+</option>
            </select>
          </div>
          <div className="cg"><label style={{fontSize:10}}>Min Avg Yr (%)</label>
            <input type="number" value={constraints.avgYrMin} onChange={e => setC("avgYrMin", Number(e.target.value))} step={5} style={{width:60,fontSize:12}}/>
          </div>
          <div className="cg"><label style={{fontSize:10}}>Sector</label>
            <select value={constraints.sector} onChange={e => setC("sector", e.target.value)} style={{width:130,fontSize:12}}>
              <option value="">All Sectors</option>
              {sectors.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          <div className="cg"><label style={{fontSize:10}}>Signal</label>
            <select value={constraints.signalFilter} onChange={e => setC("signalFilter", e.target.value)} style={{width:80,fontSize:12}}>
              <option value="buy">Buy Only</option><option value="all">All</option>
            </select>
          </div>
          <div className="cg"><label style={{fontSize:10}}>Rank By</label>
            <select value={constraints.rankBy} onChange={e => setC("rankBy", e.target.value)} style={{width:110,fontSize:12}}>
              <option value="av_yrly_return">Avg Yr Return</option><option value="est_next_yr_return">Est Next Yr</option><option value="last_yr_return">Last Yr Return</option>
            </select>
          </div>
          <div className="cg"><label style={{fontSize:10}}>Backtest Period</label>
            <select value={constraints.backtestYrs} onChange={e => setC("backtestYrs", Number(e.target.value))} style={{width:80,fontSize:12}}>
              <option value={1}>1 Year</option><option value={2}>2 Years</option><option value={3}>3 Years</option><option value={5}>5 Years</option><option value={10}>10 Years</option>
            </select>
          </div>
          <button onClick={buildPortfolio} disabled={building || !screenerData}>{building ? "Building..." : "Build Portfolio"}</button>
        </div>
        {progress && <div style={{marginTop:12,fontSize:12,color:"var(--blue)"}}>{progress}</div>}
        {failedTickers.length > 0 && !building && (
          <div style={{marginTop:8,padding:"8px 12px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:6,fontSize:12,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{color:"var(--red)",fontWeight:600}}>Failed to fetch:</span>
            <span style={{color:"var(--text2)"}}>{failedTickers.join(", ")}</span>
            <button onClick={buildPortfolio} style={{fontSize:11,padding:"3px 10px",background:"var(--bg3)",border:"1px solid var(--border)",marginLeft:"auto"}}>Retry</button>
          </div>
        )}
      </div>

      {portfolio && (
        <div>
          <div className="metrics-grid" style={{marginTop:16}}>
            <div className="metric-card"><div className="metric-label">Portfolio Annualized</div><div className="metric-value pos">{(portfolio.metrics.portAnn * 100).toFixed(1)}%</div><div className="metric-sub">{portfolio.metrics.years}yr backtest ({portfolio.metrics.dataPoints} days)</div></div>
            <div className="metric-card"><div className="metric-label">S&P 500 Annualized</div><div className="metric-value" style={{color:"var(--blue)"}}>{(portfolio.metrics.spyAnn * 100).toFixed(1)}%</div><div className="metric-sub">Same period benchmark</div></div>
            <div className="metric-card"><div className="metric-label">Max Drawdown</div><div className="metric-value neg">{(portfolio.metrics.portMaxDD * 100).toFixed(1)}%</div><div className="metric-sub">SPY: {(portfolio.metrics.spyMaxDD * 100).toFixed(1)}%</div></div>
            <div className="metric-card"><div className="metric-label">Recovery Period</div><div className="metric-value" style={{color:portfolio.metrics.portRecovery > 5 ? "var(--red)" : "var(--green)"}}>{portfolio.metrics.portRecovery.toFixed(1)} yrs</div><div className="metric-sub">{portfolio.selected.length} assets, equal weight</div></div>
          </div>

          <div className="card" style={{marginTop:16}}>
            <div className="card-title">Backtest: Growth of $100K (Buy & Hold)</div>
            <Chart data={portfolio.chartData} height={350} xKey="date"
              lines={[
                {key:"portfolio", color:"#22c55e", label:"Portfolio (" + (portfolio.metrics.portAnn * 100).toFixed(1) + "% ann.)", width:2.5},
                {key:"spy", color:"#3b82f6", label:"S&P 500 (" + (portfolio.metrics.spyAnn * 100).toFixed(1) + "% ann.)", width:1.5, opacity:0.7},
              ]}
            />
          </div>

          <div className="card" style={{marginTop:16,padding:"16px 20px"}}>
            <div className="card-title" style={{marginBottom:12}}>Selected Assets ({portfolio.selected.length})</div>
            <div className="table-wrap"><table><thead><tr>
              <th>Ticker</th><th>Sector</th><th>Mkt Cap</th><th>Weight</th>
              <th>Avg Yr</th><th>Last Yr</th><th>Recovery</th><th>Stat3 Loss</th>
            </tr></thead><tbody>
              {portfolio.selected.map(t => (
                <tr key={t.ticker} onClick={() => onSelect && onSelect(t.ticker)} style={{cursor:"pointer"}}>
                  <td className="tc">{t.ticker}</td>
                  <td style={{color:"var(--text2)",fontSize:11}}>{t.sector || "\u2014"}</td>
                  <td style={{color:"var(--text2)",fontSize:12}}>{fmtCap(t.market_cap)}</td>
                  <td style={{fontWeight:600}}>{t.weight.toFixed(1)}%</td>
                  <td className={pc(t.av_yrly_return)}>{pct(t.av_yrly_return)}</td>
                  <td className={pc(t.last_yr_return)}>{pct(t.last_yr_return)}</td>
                  <td className={rc(t.recovery_period)}>{t.recovery_period.toFixed(1)}</td>
                  <td className="neg">{pct(t.stat3_loss)}</td>
                </tr>
              ))}
            </tbody></table></div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Market Screener ──────────────────────────────────────────────────────

function MarketScreener({onSelect}) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState("");
  const [filter, setFilter] = useState("all");
  const [sortCfg, setSortCfg] = useState({key:"recovery_period",dir:1});
  const [page, setPage] = useState(0);
  const [filters, setFilters] = useState({});
  const [showFilters, setShowFilters] = useState(false);
  const perPage = 50;
  const setF = (k, v) => { setFilters(prev => { const n = {...prev}; if (v === "" || v == null) delete n[k]; else n[k] = v; return n; }); setPage(0); };

  useEffect(() => {
    fetch("data/market_screener.json")
      .then(r => r.json())
      .then(d => { setData(d); setLoading(false); })
      .catch(() => setLoading(false));
  }, []);

  const handleSort = key => { setSortCfg(prev => ({key, dir: prev.key===key ? -prev.dir : 1})); setPage(0); };

  const filtered = useMemo(() => {
    if (!data || !data.results) return [];
    let items = data.results;
    if (search) {
      const q = search.toUpperCase();
      items = items.filter(t => t.ticker.includes(q));
    }
    if (filter === "buy") items = items.filter(t => t.buy_sell_call === "Buy");
    if (filter === "sell") items = items.filter(t => t.buy_sell_call === "Sell");
    if (filters.sector) items = items.filter(t => t.sector === filters.sector);
    if (filters.market_cap_min) items = items.filter(t => (t.market_cap || 0) >= filters.market_cap_min);
    if (filters.recovery_max != null) items = items.filter(t => t.recovery_period != null && t.recovery_period <= filters.recovery_max);
    if (filters.avg_yr_min != null) items = items.filter(t => (t.av_yrly_return || 0) >= filters.avg_yr_min / 100);
    if (filters.last_yr_min != null) items = items.filter(t => (t.last_yr_return || 0) >= filters.last_yr_min / 100);
    const {key, dir} = sortCfg;
    return [...items].sort((a, b) => {
      const av = a[key] != null ? a[key] : 0, bv = b[key] != null ? b[key] : 0;
      if (typeof av === "string") return dir * av.localeCompare(bv);
      return dir * (av - bv);
    });
  }, [data, search, filter, filters, sortCfg]);

  const totalPages = Math.ceil(filtered.length / perPage);
  const pageItems = filtered.slice(page * perPage, (page + 1) * perPage);
  const activeFilterCount = Object.keys(filters).length;

  if (loading) return <div className="loading"><div className="spinner"></div> Loading market screener data...</div>;
  if (!data || !data.results || data.results.length === 0) {
    return (
      <div className="card" style={{textAlign:"center",padding:40}}>
        <div style={{fontSize:18,fontWeight:600,marginBottom:12}}>Market Screener Data Not Found</div>
        <div style={{color:"var(--text2)",maxWidth:500,margin:"0 auto",lineHeight:1.6}}>
          Run the batch script on your Mac to generate the data:<br/>
          <code style={{background:"var(--bg3)",padding:"2px 8px",borderRadius:4,fontSize:13}}>python3 fetch_all_tickers.py</code><br/><br/>
          Then push to GitHub:<br/>
          <code style={{background:"var(--bg3)",padding:"2px 8px",borderRadius:4,fontSize:13}}>git add . && git commit -m "Add screener data" && git push</code>
        </div>
      </div>
    );
  }

  const buyCount = data.results.filter(t => t.buy_sell_call === "Buy").length;
  const sellCount = data.results.length - buyCount;
  const sectors = [...new Set(data.results.map(t => t.sector).filter(Boolean))].sort();

  return (
    <div>
      <div className="metrics-grid">
        <div className="metric-card"><div className="metric-label">Total Tickers</div><div className="metric-value" style={{color:"var(--blue)"}}>{data.total_tickers.toLocaleString()}</div><div className="metric-sub">NYSE + NASDAQ</div></div>
        <div className="metric-card"><div className="metric-label">Buy Signals</div><div className="metric-value pos">{buyCount.toLocaleString()}</div><div className="metric-sub">{(buyCount/data.total_tickers*100).toFixed(0)}% of market</div></div>
        <div className="metric-card"><div className="metric-label">Sell Signals</div><div className="metric-value neg">{sellCount.toLocaleString()}</div><div className="metric-sub">{(sellCount/data.total_tickers*100).toFixed(0)}% of market</div></div>
        <div className="metric-card"><div className="metric-label">Data Date</div><div className="metric-value" style={{fontSize:18}}>{data.date}</div><div className="metric-sub">Last batch run</div></div>
      </div>

      <div className="card">
        <div className="screener-controls">
          <input className="search-input" type="text" placeholder="Search ticker..." value={search} onChange={e=>{setSearch(e.target.value.toUpperCase());setPage(0);}}/>
          <button className={"filter-btn"+(filter==="all"?" active":"")} onClick={()=>{setFilter("all");setPage(0);}}>All</button>
          <button className={"filter-btn"+(filter==="buy"?" active":"")} onClick={()=>{setFilter("buy");setPage(0);}}>Buy Only</button>
          <button className={"filter-btn"+(filter==="sell"?" active":"")} onClick={()=>{setFilter("sell");setPage(0);}}>Sell Only</button>
          <button className={"filter-btn"+(showFilters?" active":"")} onClick={()=>setShowFilters(p=>!p)} style={{marginLeft:8}}>
            Filters{activeFilterCount > 0 ? ` (${activeFilterCount})` : ""}
          </button>
          {activeFilterCount > 0 && <button className="filter-btn" onClick={()=>{setFilters({});setPage(0);}}>Clear Filters</button>}
          <select onChange={e=>{
            const v = e.target.value;
            if (v === "strong_buy") { setFilter("buy"); setFilters({market_cap_min:1e9, recovery_max:5, avg_yr_min:10}); setShowFilters(true); }
            else if (v === "large_cap_recovery") { setFilter("all"); setFilters({market_cap_min:1e10, recovery_max:3}); setShowFilters(true); }
            else if (v === "high_momentum") { setFilter("buy"); setFilters({market_cap_min:1e9, last_yr_min:20}); setShowFilters(true); }
            else if (v === "mega_cap") { setFilter("all"); setFilters({market_cap_min:1e11}); setShowFilters(true); }
            setPage(0); e.target.value = "";
          }} style={{background:"var(--bg3)",border:"1px solid var(--border)",color:"var(--text2)",padding:"7px 12px",borderRadius:8,fontSize:12,cursor:"pointer"}}>
            <option value="">Presets...</option>
            <option value="strong_buy">Strong Buy ($1B+, 10%+ avg, rec {"\u2264"}5yr)</option>
            <option value="large_cap_recovery">Large Cap Recovery ($10B+, rec {"\u2264"}3yr)</option>
            <option value="high_momentum">High Momentum (Buy, 20%+ last yr)</option>
            <option value="mega_cap">Mega Cap ($100B+)</option>
          </select>
          <button onClick={()=>exportCSV(filtered,[
            {label:"Ticker",field:"ticker"},{label:"Signal",field:"buy_sell_call"},{label:"Strength",field:"call_strength"},
            {label:"Sector",field:"sector"},{label:"Market Cap",field:"market_cap"},{label:"Last Yr Return",field:"last_yr_return"},
            {label:"Avg Yr Return",field:"av_yrly_return"},{label:"Est Next Yr",field:"est_next_yr_return"},
            {label:"Current Loss",field:"current_loss"},{label:"Stat3 Loss",field:"stat3_loss"},{label:"Recovery",field:"recovery_period"}
          ],"chc_screener.csv")} style={{fontSize:11,padding:"5px 10px",background:"var(--bg3)",border:"1px solid var(--border)",color:"var(--text2)"}}>Export CSV</button>
          <span className="screener-stats">Showing {filtered.length.toLocaleString()} tickers</span>
        </div>

        {showFilters && (
          <div style={{display:"flex",flexWrap:"wrap",gap:12,padding:"8px 16px 12px",borderBottom:"1px solid var(--border)",alignItems:"flex-end"}}>
            <div className="cg" style={{minWidth:140}}>
              <label style={{fontSize:10}}>Sector</label>
              <select value={filters.sector||""} onChange={e=>setF("sector",e.target.value)} style={{fontSize:12,padding:"4px 6px"}}>
                <option value="">All Sectors</option>
                {sectors.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
            </div>
            <div className="cg">
              <label style={{fontSize:10}}>Mkt Cap Min</label>
              <select value={filters.market_cap_min||""} onChange={e=>setF("market_cap_min",e.target.value ? Number(e.target.value) : "")} style={{fontSize:12,padding:"4px 6px",width:90}}>
                <option value="">Any</option>
                <option value={1e8}>$100M+</option>
                <option value={1e9}>$1B+</option>
                <option value={1e10}>$10B+</option>
                <option value={1e11}>$100B+</option>
              </select>
            </div>
            <div className="cg">
              <label style={{fontSize:10}}>Recovery Max (yrs)</label>
              <input type="number" value={filters.recovery_max!=null?filters.recovery_max:""} onChange={e=>setF("recovery_max",e.target.value!==""?Number(e.target.value):null)} placeholder="e.g. 5" step={0.5} style={{width:70,fontSize:12,padding:"4px 6px"}}/>
            </div>
            <div className="cg">
              <label style={{fontSize:10}}>Avg Yr Min (%)</label>
              <input type="number" value={filters.avg_yr_min!=null?filters.avg_yr_min:""} onChange={e=>setF("avg_yr_min",e.target.value!==""?Number(e.target.value):null)} placeholder="e.g. 10" step={5} style={{width:70,fontSize:12,padding:"4px 6px"}}/>
            </div>
            <div className="cg">
              <label style={{fontSize:10}}>Last Yr Min (%)</label>
              <input type="number" value={filters.last_yr_min!=null?filters.last_yr_min:""} onChange={e=>setF("last_yr_min",e.target.value!==""?Number(e.target.value):null)} placeholder="e.g. 10" step={5} style={{width:70,fontSize:12,padding:"4px 6px"}}/>
            </div>
          </div>
        )}

        <SummaryTable tickers={pageItems} onSelect={onSelect} sortCfg={sortCfg} onSort={handleSort}/>

        {totalPages>1&&(
          <div className="pagination">
            <button className="page-btn" disabled={page===0} onClick={()=>setPage(0)}>{"\u00AB"}</button>
            <button className="page-btn" disabled={page===0} onClick={()=>setPage(p=>p-1)}>{"\u2039"} Prev</button>
            <span style={{fontSize:13,color:"var(--text2)",padding:"0 8px"}}>Page </span>
            <input type="number" min={1} max={totalPages} value={page+1}
              onChange={e=>{const v=parseInt(e.target.value); if(v>=1&&v<=totalPages) setPage(v-1);}}
              onKeyDown={e=>{if(e.key==="Enter"){const v=parseInt(e.target.value); if(v>=1&&v<=totalPages) setPage(v-1);}}}
              style={{width:50,padding:"4px 6px",fontSize:12,textAlign:"center"}}/>
            <span style={{fontSize:13,color:"var(--text2)",padding:"0 8px"}}> of {totalPages}</span>
            <button className="page-btn" disabled={page>=totalPages-1} onClick={()=>setPage(p=>p+1)}>Next {"\u203A"}</button>
            <button className="page-btn" disabled={page>=totalPages-1} onClick={()=>setPage(totalPages-1)}>{"\u00BB"}</button>
          </div>
        )}
      </div>
    </div>
  );
}

function SchwabAccount({onAnalyzeTicker}) {

  const [loading, setLoading] = useState(true);
  const [holdSort, setHoldSort] = useState({key:"market_value",dir:-1});
  const [benchView, setBenchView] = useState("returns"); // returns | drawdown
  const [enabledBenchmarks, setEnabledBenchmarks] = useState({SPY:true, QQQ:true, IWM:true, DIA:true});
  const [historyData, setHistoryData] = useState(null);
  const [historyRange, setHistoryRange] = useState("ALL");
  const [balanceRange, setBalanceRange] = useState("ALL");
  const [drawdownRange, setDrawdownRange] = useState("ALL");
  const [refreshing, setRefreshing] = useState(false);
  const [lastRefresh, setLastRefresh] = useState(null);

  const refreshPrices = async () => {
    if (!schwabData || refreshing) return;
    setRefreshing(true);
    try {
      const allH = [];
      schwabData.accounts.forEach(a => a.holdings && a.holdings.forEach(h => { if (h.symbol) allH.push(h); }));
      const symbols = [...new Set(allH.map(h => h.symbol))].filter(s => s !== "MMDA1" && s !== "CASH");
      if (symbols.length === 0) { setRefreshing(false); return; }

      const resp = await fetch(`/api/yahoo_quotes?symbols=${symbols.join(",")}`);
      const data = await resp.json();
      if (!data.quotes) { setRefreshing(false); return; }

      // Deep-clone schwabData and update holdings with live prices
      const updated = JSON.parse(JSON.stringify(schwabData));
      let newTotalValue = 0;
      let newDayGain = 0;
      updated.accounts.forEach(a => {
        let acctDayGain = 0;
        (a.holdings || []).forEach(h => {
          const q = data.quotes[h.symbol];
          if (q && q.price != null) {
            const oldMV = h.market_value || 0;
            h.current_price = q.price;
            h.market_value = q.price * (h.quantity || 0);
            h.total_gain = h.quantity > 0 ? (q.price - (h.avg_cost || 0)) * h.quantity : 0;
            h.total_gain_pct = h.avg_cost > 0 ? (q.price / h.avg_cost - 1) : 0;
            h.day_gain_pct = q.change_pct != null ? q.change_pct : h.day_gain_pct;
            const dayChange = q.change != null ? q.change * (h.quantity || 0) : 0;
            acctDayGain += dayChange;
          }
          newTotalValue += h.market_value || 0;
        });
        a.day_gain = acctDayGain;
        newDayGain += acctDayGain;
      });
      // Update portfolio summary
      if (updated.portfolio_summary) {
        updated.portfolio_summary.total_value = newTotalValue;
      }
      const mktState = Object.values(data.quotes).find(q => q.market_state);
      updated._live_market_state = mktState ? mktState.market_state : null;

      setSchwabData(updated);
      setLastRefresh(new Date());
    } catch (e) {
      console.error("Refresh failed:", e);
    }
    setRefreshing(false);
  };

  const filterByRange = (data, range) => {
    if (!data) return [];
    const now = new Date();
    const rangeStart = {
      "1M": new Date(now.getFullYear(), now.getMonth()-1, now.getDate()),
      "3M": new Date(now.getFullYear(), now.getMonth()-3, now.getDate()),
      "6M": new Date(now.getFullYear(), now.getMonth()-6, now.getDate()),
      "YTD": new Date(now.getFullYear(), 0, 1),
      "1Y": new Date(now.getFullYear()-1, now.getMonth(), now.getDate()),
      "3Y": new Date(now.getFullYear()-3, now.getMonth(), now.getDate()),
      "5Y": new Date(now.getFullYear()-5, now.getMonth(), now.getDate()),
      "ALL": new Date(2000, 0, 1),
    }[range];
    const rangeStr = rangeStart.toISOString().slice(0,10);
    return data.filter(d => d.date >= rangeStr);
  };
  const rangeButtons = ["1M","3M","6M","YTD","1Y","3Y","5Y","ALL"];

  useEffect(() => {
    fetch("/api/schwab").then(r => r.json()).then(d => {
      setSchwabData(d);
      setLoading(false);
    }).catch(() => {
      // Try local file fallback
      fetch("data/schwab_cache.json").then(r => r.json()).then(d => {
        setSchwabData(d);
        setLoading(false);
      }).catch(() => setLoading(false));
    });
    // Fetch portfolio history
    fetch("/api/portfolio_history").then(r => r.json()).then(d => {
      if (Array.isArray(d) && d.length > 0) setHistoryData(d);
    }).catch(() => {
      fetch("data/portfolio_history.json").then(r => r.json()).then(d => {
        if (Array.isArray(d) && d.length > 0) setHistoryData(d);
      }).catch(() => {});
    });
  }, []);

  const handleHoldSort = key => setHoldSort(prev => ({key, dir: prev.key===key ? -prev.dir : 1}));

  if (loading) return <div className="loading"><div className="spinner"></div> Loading Schwab account data...</div>;

  if (!schwabData || schwabData.status === "not_configured" || !schwabData.accounts || schwabData.accounts.length === 0) {
    return (
      <div className="card" style={{textAlign:"center",padding:40}}>
        <div style={{fontSize:18,fontWeight:600,marginBottom:12}}>Schwab Account Not Connected</div>
        <div style={{color:"var(--text2)",maxWidth:600,margin:"0 auto",lineHeight:1.8}}>
          <div style={{marginBottom:16}}>Connect your Schwab brokerage account to see live holdings, P&L, and benchmark comparisons.</div>
          <div style={{background:"var(--bg3)",borderRadius:8,padding:16,textAlign:"left",fontSize:13}}>
            <div style={{fontWeight:600,marginBottom:8,color:"var(--text)"}}>Setup Steps:</div>
            <div>1. Create a <code>.env</code> file in chc-dashboard-web/ with your Schwab credentials</div>
            <div style={{marginTop:4}}>2. Run <code style={{background:"var(--bg)",padding:"2px 6px",borderRadius:4}}>python3 schwab_auth.py</code> to authenticate</div>
            <div style={{marginTop:4}}>3. Run <code style={{background:"var(--bg)",padding:"2px 6px",borderRadius:4}}>python3 schwab_sync.py</code> to fetch & cache data</div>
            <div style={{marginTop:4}}>4. Commit and push <code>data/schwab_cache.json</code> to deploy</div>
          </div>
        </div>
      </div>
    );
  }

  const STRATEGY_ERAS = [
    { name: "Manual Timing", start: "2019-07-17", end: "2021-08-19", color: "#8b5cf6" },
    { name: "Auto Timing",   start: "2021-08-20", end: "2025-06-12", color: "#3b82f6" },
    { name: "Manual Recovery",start: "2025-06-13", end: null,         color: "#22c55e" },
  ];

  const isStale = schwabData.status === "cached";
  const auth = schwabData.auth_status || {};
  const summary = schwabData.portfolio_summary || {};
  const benchmarks = schwabData.benchmarks || {};
  const allHoldings = [];
  schwabData.accounts.forEach(a => a.holdings && a.holdings.forEach(h => allHoldings.push(h)));

  // Add portfolio weight to each holding
  const totalPortValue = allHoldings.reduce((s, h) => s + (h.market_value || 0), 0);
  const holdingsWithWeight = allHoldings.map(h => ({...h, port_weight: totalPortValue > 0 ? h.market_value / totalPortValue : 0}));

  // Aggregate P&L
  const dayGainTotal = schwabData.accounts.reduce((s, a) => s + (a.day_gain || 0), 0);
  const dayGainPct = totalPortValue > 0 ? dayGainTotal / (totalPortValue - dayGainTotal) * 100 : 0;
  const unrealizedGain = allHoldings.reduce((s, h) => s + (h.total_gain || 0), 0);
  const unrealizedPct = totalPortValue > 0 ? unrealizedGain / (totalPortValue - unrealizedGain) : 0;

  // Sort holdings
  const sortedHoldings = [...holdingsWithWeight].sort((a,b) => {
    const av = a[holdSort.key] != null ? a[holdSort.key] : 0;
    const bv = b[holdSort.key] != null ? b[holdSort.key] : 0;
    if (typeof av === "string") return holdSort.dir * av.localeCompare(bv);
    return holdSort.dir * (av - bv);
  });

  // Sector data — build from individual holdings' sector field (not Schwab asset-class grouping)
  const sectorMap = {};
  let totalSectorValue = 0;
  allHoldings.forEach(h => {
    const name = h.sector || "Other";
    if (!sectorMap[name]) sectorMap[name] = {value: 0, count: 0, positions: []};
    sectorMap[name].value += h.market_value || 0;
    sectorMap[name].count++;
    sectorMap[name].positions.push(h.symbol);
    totalSectorValue += h.market_value || 0;
  });
  const sectors = Object.entries(sectorMap)
    .map(([name, d]) => ({name, value: d.value, weight: totalSectorValue > 0 ? d.value / totalSectorValue : 0, count: d.count, positions: d.positions}))
    .sort((a,b) => b.value - a.value);

  // Benchmark colors
  const bColors = {SPY:"#3b82f6", QQQ:"#8b5cf6", IWM:"#f59e0b", DIA:"#06b6d4"};
  const bNames = {SPY:"S&P 500", QQQ:"Nasdaq 100", IWM:"Russell 2000", DIA:"Dow 30"};

  // Sector bar colors
  const sColors = ["#3b82f6","#22c55e","#f59e0b","#8b5cf6","#ef4444","#06b6d4","#ec4899","#f97316","#14b8a6","#a855f7","#64748b","#6366f1"];

  // Synced time display
  const syncedAt = schwabData.synced_at ? new Date(schwabData.synced_at).toLocaleString() : "never";

  return (
    <div>
      {/* Auth status banner */}
      {(isStale || auth.needs_reauth) && (
        <div style={{background:isStale?"rgba(239,68,68,0.12)":"rgba(234,179,8,0.12)", border:`1px solid ${isStale?"var(--red)":"var(--gold)"}`, borderRadius:10, padding:"12px 20px", marginBottom:20, display:"flex", alignItems:"center", gap:12, fontSize:13}}>
          <span style={{fontSize:18}}>{isStale ? "\u26A0" : "\u23F0"}</span>
          <div style={{flex:1}}>
            <span style={{fontWeight:600,color:isStale?"var(--red)":"var(--gold)"}}>
              {isStale ? "Using cached data" : `Re-auth needed in ${auth.refresh_days_remaining} days`}
            </span>
            <span style={{color:"var(--text2)",marginLeft:8}}>
              Last synced: {syncedAt}
              {isStale && " \u2014 Run schwab_auth.py to reconnect"}
            </span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {lastRefresh && <span style={{color:"var(--text2)",fontSize:11}}>Prices: {lastRefresh.toLocaleTimeString()}</span>}
            <button onClick={refreshPrices} disabled={refreshing}
              style={{background:"var(--bg3)",border:"1px solid var(--border)",color:"var(--text)",padding:"4px 12px",borderRadius:6,fontSize:12,cursor:refreshing?"wait":"pointer",opacity:refreshing?0.6:1,whiteSpace:"nowrap"}}>
              {refreshing ? "Refreshing..." : "\u21BB Refresh Prices"}
            </button>
          </div>
        </div>
      )}

      {!isStale && !auth.needs_reauth && (
        <div style={{background:"rgba(34,197,94,0.08)", border:"1px solid rgba(34,197,94,0.3)", borderRadius:10, padding:"10px 20px", marginBottom:20, display:"flex", alignItems:"center", gap:12, fontSize:13}}>
          <span style={{color:"var(--green)",fontSize:10}}>{"\u25CF"}</span>
          <span style={{color:"var(--green)",fontWeight:600}}>Live</span>
          <span style={{color:"var(--text2)"}}>Synced {syncedAt} {"\u2014"} Token valid for {auth.refresh_days_remaining} days</span>
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
            {lastRefresh && <span style={{color:"var(--text2)",fontSize:11}}>Prices as of {lastRefresh.toLocaleTimeString()}{schwabData._live_market_state === "PRE" ? " (Pre-market)" : schwabData._live_market_state === "POST" || schwabData._live_market_state === "POSTPOST" ? " (After-hours)" : schwabData._live_market_state === "CLOSED" ? " (Market closed)" : ""}</span>}
            <button onClick={refreshPrices} disabled={refreshing}
              style={{background:"var(--bg3)",border:"1px solid var(--border)",color:"var(--text)",padding:"4px 12px",borderRadius:6,fontSize:12,cursor:refreshing?"wait":"pointer",opacity:refreshing?0.6:1,whiteSpace:"nowrap"}}>
              {refreshing ? "Refreshing..." : "\u21BB Refresh Prices"}
            </button>
          </div>
        </div>
      )}

      {/* Portfolio summary metrics */}
      <div className="metrics-grid">
        <div className="metric-card">
          <div className="metric-label">Total Portfolio Value</div>
          <div className="metric-value" style={{color:"var(--blue)"}}>${(summary.total_value||0).toLocaleString("en-US",{maximumFractionDigits:0})}</div>
          <div className="metric-sub">{summary.positions_count||0} positions across {summary.accounts_count||0} account(s)</div>
        </div>
        <div className="metric-card">
          <div className="metric-label">Today's P&L</div>
          <div className="metric-value" style={{color:dayGainTotal >= 0 ? "var(--green)" : "var(--red)"}}>
            {dayGainTotal >= 0 ? "+" : "-"}${Math.abs(dayGainTotal).toLocaleString("en-US",{maximumFractionDigits:0})}
          </div>
          <div className="metric-sub" style={{color:dayGainPct >= 0 ? "var(--green)" : "var(--red)"}}>{dayGainPct >= 0 ? "+" : ""}{dayGainPct.toFixed(2)}% today</div>
        </div>
        <div className="metric-card">
          <div className="metric-label">Unrealized Gain</div>
          <div className="metric-value" style={{color:unrealizedGain >= 0 ? "var(--green)" : "var(--red)"}}>
            {unrealizedGain >= 0 ? "+" : "-"}${Math.abs(unrealizedGain).toLocaleString("en-US",{maximumFractionDigits:0})}
          </div>
          <div className="metric-sub">{pct(unrealizedPct)} total return</div>
        </div>
        <div className="metric-card">
          <div className="metric-label">Cash Balance</div>
          <div className="metric-value">${(summary.total_cash||0).toLocaleString("en-US",{maximumFractionDigits:0})}</div>
          <div className="metric-sub">{summary.total_equity ? ((summary.total_cash / summary.total_equity * 100).toFixed(1) + "% of equity") : ""}</div>
        </div>
      </div>

      {/* Performance history chart */}
      {historyData && historyData.length >= 2 && (() => {
        const filtered = filterByRange(historyData, historyRange);
        if (filtered.length < 2) return null;

        // CHC Share Price Index — the fund's NAV per share
        // Normalized to $1.00 at the start of the selected range, with SPY rebased to match
        // After the spreadsheet ends (Feb 2026), extends using TWR from Schwab balances
        const tradingDays = filtered.filter(d => d.benchmark_prices?.SPY > 0 || d.chc_price > 0);
        const source = tradingDays.length >= 2 ? tradingDays : filtered;
        const chartData = [];
        let lastSpyPrice = 0;
        let lastChcPrice = 0;
        // Find first valid prices
        for (const d of source) { if (d.benchmark_prices?.SPY > 0) { lastSpyPrice = d.benchmark_prices.SPY; break; } }
        for (const d of source) { if (d.chc_price > 0) { lastChcPrice = d.chc_price; break; } }
        const spyStart = lastSpyPrice || 1;
        const chcStart = lastChcPrice || 1;
        // Normalize SPY to start at same value as CHC price
        let chcIndex = chcStart;

        for (let i = 0; i < source.length; i++) {
          const d = source[i];
          if (d.chc_price > 0) {
            chcIndex = d.chc_price;
          } else if (i > 0) {
            // Extend CHC index using TWR after spreadsheet ends
            const prev = source[i-1];
            const prevValue = prev.total_value || prev.total_equity || 1;
            const currValue = d.total_value || d.total_equity || 0;
            const flows = d.net_flows || 0;
            const dailyReturn = (currValue - prevValue - flows) / prevValue;
            chcIndex *= (1 + dailyReturn);
          }
          // Carry forward last known SPY price
          if (d.benchmark_prices?.SPY > 0) lastSpyPrice = d.benchmark_prices.SPY;
          // Normalize SPY so it starts at the same value as CHC
          const spyNorm = (lastSpyPrice / spyStart) * chcStart;

          chartData.push({
            date: d.date,
            portfolio: Math.round(chcIndex * 10000) / 10000,
            spy: Math.round(spyNorm * 10000) / 10000,
          });
        }

        const lastPortfolio = chartData[chartData.length-1].portfolio;
        const lastSpy = chartData[chartData.length-1].spy;
        const portfolioReturn = ((lastPortfolio / chcStart) - 1) * 100;
        const spyReturn = ((lastSpy / chcStart) - 1) * 100;

        // Annualized returns
        const startDate = new Date(source[0].date);
        const endDate = new Date(source[source.length-1].date);
        const years = (endDate - startDate) / (365.25 * 24 * 60 * 60 * 1000);
        const chcAnn = years > 0 ? (Math.pow(lastPortfolio / chcStart, 1/years) - 1) * 100 : 0;
        const spyAnn = years > 0 ? (Math.pow(lastSpy / chcStart, 1/years) - 1) * 100 : 0;

        return (
          <div className="card" style={{position:"relative",padding:"12px 20px 20px"}}>
            <div style={{position:"absolute",top:12,left:20,zIndex:2}}>
              <div className="card-title" style={{margin:0}}>CHC Share Price</div>
              <div style={{fontSize:12,color:"var(--text2)",marginTop:2}}>
